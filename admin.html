<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="login-screen" class="container mt-5 pt-5" style="max-width: 400px;">
    <div class="card card-custom p-4 text-center">
        <img src="logo.png" height="80" class="mx-auto mb-3">
        <h4 class="fw-bold">Admin RT 003</h4>
        <input type="email" id="adm-email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="adm-pass" class="form-control mb-3" placeholder="Password">
        <button class="btn btn-navy text-white w-100" onclick="login()">Login</button>
    </div>
</div>

<div id="admin-dashboard" class="d-none">
    <div class="sidebar">
        <div class="text-center mb-4"><img src="logo.png" height="50"></div>
        <a href="#" class="active" onclick="showSection('sec-dashboard')">📊 Dashboard</a>
        <a href="#" onclick="showSection('sec-kas')">💰 Kelola Kas</a>
        <a href="#" onclick="showSection('sec-ronda')">👮 Kelola Ronda</a>
        <a href="#" onclick="showSection('sec-warga')">👥 Kelola Warga</a>
        <a href="index.html" target="_blank" style="background: var(--orange);">💡 Beranda Warga</a>
        <hr>
        <a href="#" onclick="firebase.auth().signOut()">Logout</a>
    </div>

    <div class="main-content">
        <div id="sec-dashboard" class="admin-sec">
            <h2 class="fw-bold">Ringkasan RT 003</h2>
            <div class="row mt-4">
                <div class="col-md-8"><div class="card card-custom p-3"><canvas id="kasChart"></canvas></div></div>
                <div class="col-md-4">
                    <div class="card card-custom p-3 bg-navy text-white">
                        <h6>Total Saldo</h6>
                        <h3 id="adm-total-kas">Rp 0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="sec-kas" class="admin-sec d-none">
            <h2 class="fw-bold">Manajemen Kas</h2>
            <div class="card card-custom p-4">
                <div class="row g-2">
                    <div class="col-md-4"><input type="number" id="kas-amt" class="form-control" placeholder="Nominal Rp"></div>
                    <div class="col-md-4">
                        <select id="kas-type" class="form-select">
                            <option value="in">Pemasukan</option>
                            <option value="out">Pengeluaran</option>
                        </select>
                    </div>
                    <div class="col-md-4"><button class="btn btn-primary w-100" onclick="updateKas()">Simpan Transaksi</button></div>
                </div>
            </div>
        </div>

        <div id="sec-ronda" class="admin-sec d-none">
            <h2 class="fw-bold">Jadwal Ronda Mingguan</h2>
            <div class="card card-custom p-4">
                <select id="ronda-hari" class="form-select mb-2">
                    <option value="Senin">Senin</option><option value="Selasa">Selasa</option>
                    <option value="Rabu">Rabu</option><option value="Kamis">Kamis</option>
                    <option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option>
                    <option value="Minggu">Minggu</option>
                </select>
                <textarea id="ronda-petugas" class="form-control mb-3" placeholder="Nama-nama petugas..."></textarea>
                <button class="btn btn-navy text-white w-100" onclick="updateRonda()">Update Jadwal</button>
            </div>
        </div>

        <div id="sec-warga" class="admin-sec d-none">
            <h2 class="fw-bold">Data Warga</h2>
            <div class="card card-custom p-4">
                <div class="d-flex gap-2 mb-3">
                    <input type="text" id="w-nama" class="form-control" placeholder="Nama">
                    <input type="text" id="w-hp" class="form-control" placeholder="WhatsApp">
                    <button class="btn btn-success" onclick="addWarga()">Tambah</button>
                </div>
                <table class="table small"><tbody id="adm-warga-list"></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('login-screen').classList.add('d-none');
            document.getElementById('admin-dashboard').classList.remove('d-none');
            initAdmin();
        } else {
            document.getElementById('login-screen').classList.remove('d-none');
            document.getElementById('admin-dashboard').classList.add('d-none');
        }
    });

    async function login() {
        const e = document.getElementById('adm-email').value;
        const p = document.getElementById('adm-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Login Gagal!"); }
    }

    function showSection(id) {
        document.querySelectorAll('.admin-sec').forEach(s => s.classList.add('d-none'));
        document.getElementById(id).classList.remove('d-none');
    }

    function initAdmin() {
        // Load Kas & Chart
        db.collection("config").doc("kas").onSnapshot(doc => {
            const total = doc.data() ? doc.data().total : 0;
            document.getElementById('adm-total-kas').innerText = `Rp ${Number(total).toLocaleString('id-ID')}`;
        });

        // Load Warga
        db.collection("warga").onSnapshot(s => {
            let h = "";
            s.forEach(d => { h += `<tr><td>${d.data().nama}</td><td><button class="btn btn-danger btn-sm" onclick="db.collection('warga').doc('${d.id}').delete()">Hapus</button></td></tr>`; });
            document.getElementById('adm-warga-list').innerHTML = h;
        });
    }

    async function updateKas() {
        const amt = parseInt(document.getElementById('kas-amt').value);
        const type = document.getElementById('kas-type').value;
        const ref = db.collection("config").doc("kas");
        const doc = await ref.get();
        let total = doc.exists ? doc.data().total : 0;
        total = (type === 'in') ? total + amt : total - amt;
        await ref.set({ total });
        alert("Kas Berhasil Diupdate!");
    }

    async function updateRonda() {
        const hari = document.getElementById('ronda-hari').value;
        const petugas = document.getElementById('ronda-petugas').value;
        await db.collection("ronda").doc(hari).set({ petugas, order: 1 }); // Tambahkan order manual jika perlu urutan
        alert("Jadwal Ronda Terupdate!");
    }

    async function addWarga() {
        const nama = document.getElementById('w-nama').value;
        const hp = document.getElementById('w-hp').value;
        await db.collection("warga").add({ nama, hp, status: "Tetap" });
        alert("Warga Ditambahkan!");
    }
</script>
</body>
</html>
