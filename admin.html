<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel RT 003 RW 001</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --primary: #0d6efd; --navy: #1a3a5f; --light-bg: #f4f7fa; }
        body { background: var(--light-bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Sidebar Design */
        .sidebar { width: 280px; height: 100vh; position: fixed; background: white; border-right: 1px solid #eef2f6; z-index: 1000; transition: 0.3s; }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #f8f9fa; }
        .nav-link { padding: 12px 20px; color: #6c757d; font-weight: 500; display: flex; align-items: center; gap: 12px; border-radius: 12px; margin: 4px 15px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: #eef5ff; color: var(--primary); }
        .nav-link i { font-size: 1.2rem; }

        /* Main Content */
        .main-content { margin-left: 280px; padding: 30px; transition: 0.3s; }
        .card-stat { border: none; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .admin-section { display: none; animation: slideUp 0.4s ease; }
        .active-section { display: block; }

        /* Icon Colors */
        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .bg-soft-primary { background: #eef5ff; color: #0d6efd; }
        .bg-soft-success { background: #eafff1; color: #2ecc71; }
        .bg-soft-warning { background: #fff9e6; color: #f39c12; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); width: 250px; }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
        
        .toast-custom { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 15px 25px; border-radius: 15px; color: white; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="notif-box" class="toast-custom"></div>

<div class="d-lg-none bg-white p-3 shadow-sm d-flex justify-content-between align-items-center">
    <b class="text-navy">ADMIN RT 003</b>
    <button class="btn btn-light" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list fs-3"></i></button>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header text-center">
        <h5 class="fw-bold mb-0 text-navy">PANEL KONTROL</h5>
        <small class="text-muted">RT.003 RW.001</small>
    </div>
    <nav class="mt-4">
        <a href="javascript:void(0)" class="nav-link active" onclick="showSec('s-home', this)"><i class="bi bi-grid-fill"></i> Dashboard</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showSec('s-kas', this)"><i class="bi bi-cash-stack"></i> Kas & Dansos</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showSec('s-warga', this)"><i class="bi bi-people"></i> Data Warga</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showSec('s-info', this)"><i class="bi bi-megaphone"></i> Pengumuman</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showSec('s-aduan', this)"><i class="bi bi-chat-dots"></i> Aduan Warga</a>
        <div class="mt-5 px-3 pt-5"><button class="btn btn-danger w-100 py-2 rounded-4 fw-bold" onclick="logoutAdmin()"><i class="bi bi-box-arrow-left me-2"></i> KELUAR</button></div>
    </nav>
</div>

<div class="main-content">
    
    <div id="s-home" class="admin-section active-section">
        <h4 class="fw-bold mb-4">Ringkasan Sistem</h4>
        <div class="row g-3">
            <div class="col-md-4">
                <div class="card card-stat bg-white border-0 h-100">
                    <div class="icon-box bg-soft-success"><i class="bi bi-wallet2 fs-4"></i></div>
                    <small class="text-muted d-block">Total Kas RT</small>
                    <h3 class="fw-bold text-navy" id="stat-kas">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat bg-white border-0 h-100">
                    <div class="icon-box bg-soft-warning"><i class="bi bi-heart-fill fs-4"></i></div>
                    <small class="text-muted d-block">Dana Sosial</small>
                    <h3 class="fw-bold text-navy" id="stat-dansos">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat bg-white border-0 h-100">
                    <div class="icon-box bg-soft-primary"><i class="bi bi-person-check fs-4"></i></div>
                    <small class="text-muted d-block">Jumlah Warga</small>
                    <h3 class="fw-bold text-navy" id="stat-warga">0 Jiwa</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="s-kas" class="admin-section">
        <h4 class="fw-bold mb-4 text-navy">Input Keuangan</h4>
        <div class="card border-0 p-4 shadow-sm rounded-4 mb-4">
            <div class="row g-3">
                <div class="col-md-3"><label class="small fw-bold">Nominal</label><input type="number" id="k-amt" class="form-control rounded-3" placeholder="Contoh: 50000"></div>
                <div class="col-md-3"><label class="small fw-bold">Kategori</label><select id="k-cat" class="form-select rounded-3"><option value="kas">Kas RT</option><option value="dansos">Dana Sosial (Dansos)</option></select></div>
                <div class="col-md-2"><label class="small fw-bold">Tipe</label><select id="k-type" class="form-select rounded-3"><option value="in">Pemasukan (+)</option><option value="out">Pengeluaran (-)</option></select></div>
                <div class="col-md-4"><label class="small fw-bold">Keterangan</label><input type="text" id="k-info" class="form-control rounded-3" placeholder="Nama warga / keperluan"></div>
                <div class="col-12"><button class="btn btn-primary w-100 fw-bold py-2 rounded-3" onclick="saveTransaksi()">SIMPAN TRANSAKSI</button></div>
            </div>
        </div>
        <div class="bg-white p-3 rounded-4 shadow-sm border-0 table-responsive"><table class="table align-middle"><tbody id="list-transaksi"></tbody></table></div>
    </div>

    <div id="s-warga" class="admin-section">
        <h4 class="fw-bold mb-4 text-navy">Manajemen Warga</h4>
        <div class="card border-0 p-4 shadow-sm rounded-4 mb-4">
            <div class="row g-2">
                <div class="col-md-5"><input type="text" id="w-nama" class="form-control rounded-3" placeholder="Nama Lengkap Warga"></div>
                <div class="col-md-4"><input type="number" id="w-telp" class="form-control rounded-3" placeholder="No. WhatsApp"></div>
                <div class="col-md-3"><button class="btn btn-success w-100 fw-bold py-2 rounded-3" onclick="saveWarga()">TAMBAHKAN</button></div>
            </div>
        </div>
        <div class="bg-white p-3 rounded-4 shadow-sm border-0"><table class="table table-hover"><tbody id="list-warga"></tbody></table></div>
    </div>

    <div id="s-aduan" class="admin-section">
        <h4 class="fw-bold mb-4 text-navy">Laporan Masuk</h4>
        <div id="list-aduan" class="row g-3"></div>
    </div>

    <div id="s-info" class="admin-section">
        <h4 class="fw-bold mb-4 text-navy">Update Informasi Warga</h4>
        <div class="card border-0 p-4 shadow-sm rounded-4">
            <textarea id="adm-p" class="form-control mb-3 border-0 bg-light py-3" rows="6" placeholder="Tuliskan berita/pengumuman RT di sini..." style="border-radius: 15px;"></textarea>
            <button class="btn btn-danger w-100 fw-bold py-2 rounded-3" onclick="saveP()">TERBITKAN SEKARANG</button>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function n(msg, col="#1a3a5f") {
        const b = document.getElementById('notif-box');
        b.innerText = msg; b.style.backgroundColor = col; b.style.display = 'block';
        setTimeout(() => b.style.display='none', 3000);
    }

    function showSec(id, el) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        el.classList.add('active');
        if(window.innerWidth < 992) document.getElementById('sidebar').classList.remove('show');
    }

    // AUTH CHECK
    auth.onAuthStateChanged(u => { if(!u) window.location.href="index.html"; });

    // DASHBOARD STATS
    db.collection("config").doc("kas").onSnapshot(d => { if(d.exists) document.getElementById('stat-kas').innerText = "Rp " + d.data().total.toLocaleString(); });
    db.collection("config").doc("dansos").onSnapshot(d => { if(d.exists) document.getElementById('stat-dansos').innerText = "Rp " + d.data().total.toLocaleString(); });
    db.collection("warga").onSnapshot(s => { document.getElementById('stat-warga').innerText = s.size + " Jiwa"; });

    // TRANSAKSI LOGIC (Sama seperti sebelumnya, diperkuat)
    async function saveTransaksi() {
        const amt = parseInt(document.getElementById('k-amt').value) || 0;
        const cat = document.getElementById('k-cat').value;
        const type = document.getElementById('k-type').value;
        const info = document.getElementById('k-info').value;

        if(amt <= 0 || !info) return n("Input tidak valid!", "#e74c3c");

        try {
            await db.collection("transaksi").add({ nominal: amt, kategori: cat, tipe: type, keterangan: info, tgl: firebase.firestore.Timestamp.now() });
            const refSaldo = db.collection("config").doc(cat);
            db.runTransaction(async (transaction) => {
                const snap = await transaction.get(refSaldo);
                let total = snap.exists ? Number(snap.data().total || 0) : 0;
                total = (type === 'in') ? total + amt : total - amt;
                transaction.set(refSaldo, { total: total }, { merge: true });
            });
            n("✅ Transaksi Berhasil!");
            document.getElementById('k-amt').value = ""; document.getElementById('k-info').value = "";
        } catch(e) { n("❌ Error", "#e74c3c"); }
    }

    // LIST VIEW TRANSAKSI
    db.collection("transaksi").orderBy("tgl", "desc").limit(10).onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const t = d.data();
            h += `<tr class="border-bottom">
                <td><span class="badge ${t.kategori=='kas'?'bg-success':'bg-warning text-dark'}">${t.kategori.toUpperCase()}</span></td>
                <td><b class="${t.tipe=='in'?'text-success':'text-danger'}">${t.tipe=='in'?'+':'-'} Rp ${t.nominal.toLocaleString()}</b></td>
                <td class="small text-muted">${t.keterangan}</td>
                <td class="text-end"><button class="btn btn-sm btn-link text-danger" onclick="hapusTr('${d.id}', ${t.nominal}, '${t.tipe}', '${t.kategori}')"><i class="bi bi-trash"></i></button></td>
            </tr>`;
        });
        document.getElementById('list-transaksi').innerHTML = h;
    });

    // PENGADUAN VIEW
    db.collection("pengaduan").orderBy("tgl", "desc").onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const a = d.data();
            h += `<div class="col-md-6"><div class="card p-3 border-0 shadow-sm rounded-4">
                    <div class="d-flex justify-content-between"><b>${a.nama}</b><small class="text-muted">${a.tgl.toDate().toLocaleDateString()}</small></div>
                    <p class="small text-muted mt-2">${a.pesan}</p>
                    <button class="btn btn-sm btn-outline-danger w-25" onclick="db.collection('pengaduan').doc('${d.id}').delete()">Hapus</button>
                  </div></div>`;
        });
        document.getElementById('list-aduan').innerHTML = h || "<p class='text-muted'>Aduan kosong.</p>";
    });

    // LOGIKA WARGA (LIST)
    db.collection("warga").orderBy("nama").onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const w = d.data();
            h += `<tr><td><b>${w.nama}</b></td><td>${w.telp || "-"}</td><td class="text-end"><button class="btn btn-sm btn-outline-danger border-0" onclick="delWarga('${d.id}')">🗑️ Hapus</button></td></tr>`;
        });
        document.getElementById('list-warga').innerHTML = h;
    });

    async function saveWarga() {
        const nama = document.getElementById('w-nama').value;
        const telp = document.getElementById('w-telp').value;
        if(!nama) return n("Isi nama warga!", "#e74c3c");
        await db.collection("warga").add({ nama, telp });
        n("✅ Warga ditambahkan");
        document.getElementById('w-nama').value = ""; document.getElementById('w-telp').value = "";
    }

    async function saveP() {
        const isi = document.getElementById('adm-p').value;
        await db.collection("config").doc("pengumuman").set({ isi });
        n("✅ Pengumuman Terbit!");
    }

    function logoutAdmin() { auth.signOut().then(() => window.location.href="index.html"); }
</script>
</body>
</html>
