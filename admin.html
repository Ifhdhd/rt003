<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --navy: #1a3a5f; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--navy); color: white; padding: 20px; transition: 0.3s; z-index: 1050; }
        .main-content { margin-left: 260px; padding: 20px; transition: 0.3s; min-height: 100vh; }
        .admin-section { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        .toast-custom { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 25px; border-radius: 50px; color: white; display: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 280px; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 991px) { .sidebar { transform: translateX(-100%); } .sidebar.show { transform: translateX(0); } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="notif-box" class="toast-custom shadow-lg"></div>

<div class="d-lg-none bg-white p-3 shadow-sm d-flex justify-content-between align-items-center">
    <b class="text-navy">ADMIN RT 003</b>
    <button class="btn btn-dark" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button>
</div>

<div class="sidebar" id="sidebar">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold m-0 text-white">MENU ADMIN</h5>
        <button class="btn btn-sm btn-light d-lg-none" onclick="document.getElementById('sidebar').classList.remove('show')">✕</button>
    </div>
    <hr>
    <nav class="nav flex-column gap-2">
        <a href="javascript:void(0)" class="nav-link text-white" onclick="showSec('s-kas')"><i class="bi bi-cash-stack me-2"></i> Keuangan</a>
        <a href="javascript:void(0)" class="nav-link text-white" onclick="showSec('s-ronda')"><i class="bi bi-shield-check me-2"></i> Jadwal Ronda</a>
        <a href="javascript:void(0)" class="nav-link text-white" onclick="showSec('s-warga')"><i class="bi bi-people me-2"></i> Data Warga</a>
        <a href="javascript:void(0)" class="nav-link text-white" onclick="showSec('s-info')"><i class="bi bi-megaphone me-2"></i> Pengumuman</a>
        <a href="javascript:void(0)" class="nav-link text-danger mt-5 fw-bold" onclick="logoutAdmin()"><i class="bi bi-door-open me-2"></i> Logout</a>
    </nav>
</div>

<div class="main-content">
    <div id="s-kas" class="admin-section active">
        <h4 class="fw-bold mb-3">Input Kas RT</h4>
        <div class="card p-3 shadow-sm mb-3 border-0">
            <div class="row g-2">
                <div class="col-6"><label class="small fw-bold">Nominal</label><input type="number" id="k-amt" class="form-control" placeholder="Rp"></div>
                <div class="col-6"><label class="small fw-bold">Tipe</label><select id="k-type" class="form-select" onchange="toggleFormKas()"><option value="in">Masuk</option><option value="out">Keluar</option></select></div>
                <div class="col-12" id="input-nama"><label class="small fw-bold">Nama Warga</label><input type="text" id="k-nama" class="form-control"></div>
                <div class="col-12 d-none" id="input-ket"><label class="small fw-bold">Keterangan</label><input type="text" id="k-note" class="form-control"></div>
                <button class="btn btn-primary mt-3 fw-bold" onclick="saveKas()">SIMPAN KAS</button>
            </div>
        </div>
        <div class="table-responsive bg-white rounded shadow-sm p-2"><table class="table table-sm small"><tbody id="list-kas"></tbody></table></div>
    </div>

    <div id="s-ronda" class="admin-section">
        <h4 class="fw-bold mb-3">Atur Petugas Ronda</h4>
        <div class="card p-3 shadow-sm mb-3 border-0">
            <div class="row g-2">
                <div class="col-md-4"><label class="small fw-bold">Pilih Hari</label>
                    <select id="r-hari" class="form-select"><option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option></select>
                </div>
                <div class="col-md-8"><label class="small fw-bold">Pilih Nama Warga</label>
                    <select id="r-warga" class="form-select"><option value="">-- Loading Data Warga --</option></select>
                </div>
                <button class="btn btn-navy bg-primary text-white mt-3 fw-bold" onclick="saveRonda()">TAMBAHKAN KE JADWAL</button>
            </div>
        </div>
        <div id="list-ronda-view" class="row g-3"></div>
    </div>

    <div id="s-warga" class="admin-section">
        <h4 class="fw-bold mb-3">Kelola Data Warga</h4>
        <div class="card p-3 shadow-sm mb-3 border-0">
            <div class="row g-2">
                <div class="col-md-4"><input type="text" id="w-nama" class="form-control" placeholder="Nama Lengkap"></div>
                <div class="col-md-4"><input type="number" id="w-telp" class="form-control" placeholder="No HP/WhatsApp (Contoh: 0812...)"></div>
                <div class="col-md-4"><select id="w-status" class="form-select"><option>Tetap</option><option>Kontrak</option></select></div>
                <button class="btn btn-success mt-2 fw-bold" onclick="saveWarga()">SIMPAN DATA WARGA</button>
            </div>
        </div>
        <div class="bg-white rounded shadow-sm p-3">
            <table class="table table-hover align-middle">
                <thead><tr><th>Nama</th><th>No. Telp</th><th>Status</th><th class="text-end">Aksi</th></tr></thead>
                <tbody id="list-warga"></tbody>
            </table>
        </div>
    </div>

    <div id="s-info" class="admin-section">
        <h4 class="fw-bold mb-3">Update Pengumuman</h4>
        <div class="card p-3 shadow-sm border-0">
            <textarea id="adm-p" class="form-control mb-3" rows="5" placeholder="Tulis info warga di sini..."></textarea>
            <button class="btn btn-danger w-100 fw-bold py-2" onclick="saveP()">TERBITKAN PENGUMUMAN</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function n(msg, col="#2ecc71") {
        const b = document.getElementById('notif-box');
        b.innerText = msg; b.style.backgroundColor = col; b.style.display = 'block';
        setTimeout(() => b.style.display='none', 3000);
    }

    function showSec(id) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        if(window.innerWidth < 992) document.getElementById('sidebar').classList.remove('show');
    }

    auth.onAuthStateChanged(u => { if(!u) window.location.href="index.html"; });

    // --- LOGIKA WARGA (DENGAN NO TELP) ---
    async function saveWarga() {
        const nama = document.getElementById('w-nama').value;
        const telp = document.getElementById('w-telp').value;
        const status = document.getElementById('w-status').value;
        if(!nama) return n("Nama wajib diisi!", "#e74c3c");
        try {
            await db.collection("warga").add({ nama, telp: telp || "-", status });
            n("✅ Data Warga Tersimpan");
            document.getElementById('w-nama').value = ""; document.getElementById('w-telp').value = "";
        } catch(e) { n("❌ Gagal Simpan", "#e74c3c"); }
    }

    db.collection("warga").orderBy("nama").onSnapshot(s => {
        let h = ""; 
        let opt = '<option value="">-- Pilih Warga --</option>';
        s.forEach(d => {
            const w = d.data();
            h += `<tr><td><b>${w.nama}</b></td><td>${w.telp || "-"}</td><td><small>${w.status}</small></td><td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="delWarga('${d.id}')">🗑️</button></td></tr>`;
            opt += `<option value="${w.nama}">${w.nama}</option>`;
        });
        document.getElementById('list-warga').innerHTML = h;
        document.getElementById('r-warga').innerHTML = opt; // Update pilihan di jadwal ronda
    });

    async function delWarga(id) {
        if(!confirm("Hapus data warga ini?")) return;
        await db.collection("warga").doc(id).delete();
        n("🗑️ Warga Dihapus", "#e67e22");
    }

    // --- LOGIKA RONDA (SINKRON WARGA) ---
    async function saveRonda() {
        const hari = document.getElementById('r-hari').value;
        const nama = document.getElementById('r-warga').value;
        if(!nama) return n("Pilih nama warga dulu!", "#e74c3c");
        try {
            await db.collection("ronda").add({ hari, nama, tgl: firebase.firestore.Timestamp.now() });
            n("✅ Petugas Ronda Ditambahkan");
        } catch(e) { n("❌ Gagal", "#e74c3c"); }
    }

    db.collection("ronda").orderBy("tgl").onSnapshot(s => {
        const hariArr = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu", "Minggu"];
        let dataH = {};
        hariArr.forEach(h => dataH[h] = "");
        
        s.forEach(d => {
            const r = d.data();
            dataH[r.hari] += `<div class="d-flex justify-content-between border-bottom py-1 small">
                <span>• ${r.nama}</span>
                <span class="text-danger pointer" style="cursor:pointer" onclick="delRonda('${d.id}')">✕</span>
            </div>`;
        });

        let html = "";
        hariArr.forEach(h => {
            html += `<div class="col-md-4 col-6">
                <div class="card p-2 shadow-sm h-100 border-0">
                    <b class="text-navy mb-2 border-bottom border-primary border-2 w-50">${h}</b>
                    ${dataH[h] || '<span class="text-muted small">Kosong</span>'}
                </div>
            </div>`;
        });
        document.getElementById('list-ronda-view').innerHTML = html;
    });

    async function delRonda(id) {
        await db.collection("ronda").doc(id).delete();
        n("🗑️ Petugas Dihapus", "#e67e22");
    }

    // (Logika Kas & Pengumuman tetap sama agar tidak hilang)
    function toggleFormKas() {
        const tp = document.getElementById('k-type').value;
        document.getElementById('input-nama').classList.toggle('d-none', tp === 'out');
        document.getElementById('input-ket').classList.toggle('d-none', tp === 'in');
    }
    
    async function saveP() {
        const isi = document.getElementById('adm-p').value;
        await db.collection("config").doc("pengumuman").set({ isi });
        n("✅ Pengumuman Terbit!");
    }

    function logoutAdmin() { auth.signOut().then(() => window.location.href="index.html"); }
</script>
</body>
</html>
