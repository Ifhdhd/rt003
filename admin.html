<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin RT 003 - Kelola Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .btn-rt { border-radius: 8px; font-weight: 600; }
        .table-rt { font-size: 14px; background: white; border-radius: 10px; overflow: hidden; }
        .stat-card { border-left: 5px solid var(--orange); }
    </style>
</head>
<body>

    <div id="login-form" class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow-lg border-0" style="width: 380px; border-radius: 20px;">
            <div class="text-center mb-4">
                <img src="logo.png" height="70" class="mb-3 rounded-circle border shadow-sm">
                <h5 class="fw-bold text-navy">Login Pengurus RT 003</h5>
            </div>
            <input type="email" id="email" class="form-control mb-2" placeholder="Email Admin">
            <input type="password" id="password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-navy text-white w-100 p-2 fw-bold" onclick="handleLogin()">Masuk ke Panel</button>
            <p id="login-error" class="text-danger small mt-2 text-center"></p>
        </div>
    </div>

    <div id="admin-panel" class="d-none">
        <div class="sidebar shadow">
            <div class="text-center mb-4">
                <img src="logo.png" height="50" class="rounded-circle border">
                <p class="small mt-2 fw-bold opacity-75">ADMIN PORTAL</p>
            </div>
            <a href="#" class="nav-link active" onclick="showSec('sec-kas', this)"><i class="bi bi-wallet2 me-2"></i> Laporan Kas</a>
            <a href="#" class="nav-link" onclick="showSec('sec-ronda', this)"><i class="bi bi-shield-check me-2"></i> Jadwal Ronda</a>
            <a href="#" class="nav-link" onclick="showSec('sec-warga', this)"><i class="bi bi-people me-2"></i> Data Warga</a>
            <a href="#" class="nav-link" onclick="showSec('sec-foto', this)"><i class="bi bi-camera me-2"></i> Foto Kegiatan</a>
            <hr class="opacity-25">
            <a href="index.html" target="_blank" class="bg-orange text-white mb-2"><i class="bi bi-eye me-2"></i> Lihat Web Warga</a>
            <a href="#" onclick="firebase.auth().signOut()" class="text-danger mt-4"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
        </div>

        <div class="main-content">
            <div id="sec-kas" class="admin-section active">
                <h3 class="fw-bold text-navy mb-4">💰 Manajemen Kas RT</h3>
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="card card-custom p-4 stat-card">
                            <small class="text-muted">Total Saldo Saat Ini</small>
                            <h2 class="fw-bold text-navy" id="adm-total-saldo">Rp 0</h2>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card card-custom p-4">
                            <h6 class="fw-bold mb-3">Input Transaksi Baru</h6>
                            <div class="row g-2">
                                <div class="col-md-5"><input type="number" id="kas-amt" class="form-control" placeholder="Nominal (Rp)"></div>
                                <div class="col-md-4">
                                    <select id="kas-type" class="form-select">
                                        <option value="in">Pemasukan (+)</option>
                                        <option value="out">Pengeluaran (-)</option>
                                    </select>
                                </div>
                                <div class="col-md-3"><button class="btn btn-primary w-100" onclick="saveKas()">Simpan</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-ronda" class="admin-section">
                <h3 class="fw-bold text-navy mb-4">👮 Update Jadwal Ronda</h3>
                <div class="card card-custom p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <select id="ron-hari" class="form-select">
                                <option value="Senin">Senin</option><option value="Selasa">Selasa</option>
                                <option value="Rabu">Rabu</option><option value="Kamis">Kamis</option>
                                <option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option>
                                <option value="Minggu">Minggu</option>
                            </select>
                        </div>
                        <div class="col-md-6"><input type="text" id="ron-nama" class="form-control" placeholder="Nama Petugas (Contoh: Bpk. Mukhid, Bpk. Lucky)"></div>
                        <div class="col-md-2"><button class="btn btn-warning w-100 fw-bold" onclick="saveRonda()">Update</button></div>
                    </div>
                </div>
            </div>

            <div id="sec-warga" class="admin-section">
                <h3 class="fw-bold text-navy mb-4">👥 Kelola Data Warga</h3>
                <div class="card card-custom p-4 mb-4">
                    <h6 class="fw-bold mb-3">Tambah Warga Baru</h6>
                    <div class="row g-2">
                        <div class="col-md-4"><input type="text" id="w-nama" class="form-control" placeholder="Nama Lengkap"></div>
                        <div class="col-md-3"><input type="text" id="w-hp" class="form-control" placeholder="No HP (0812...)"></div>
                        <div class="col-md-3">
                            <select id="w-status" class="form-select">
                                <option value="Tetap">Warga Tetap</option>
                                <option value="Kontrak">Warga Kontrak</option>
                            </select>
                        </div>
                        <div class="col-md-2"><button class="btn btn-success w-100" onclick="saveWarga()">Tambah</button></div>
                    </div>
                </div>
                <div class="card card-custom p-0 overflow-hidden">
                    <table class="table table-rt align-middle m-0">
                        <thead class="table-dark"><tr><th>Nama</th><th>WhatsApp</th><th>Status</th><th>Aksi</th></tr></thead>
                        <tbody id="adm-list-warga"></tbody>
                    </table>
                </div>
            </div>

            <div id="sec-foto" class="admin-section">
                <h3 class="fw-bold text-navy mb-4">📸 Upload Foto Kegiatan</h3>
                <div class="card card-custom p-4">
                    <input type="file" id="f-file" class="form-control mb-3" accept="image/*">
                    <button class="btn btn-primary" onclick="uploadFoto()">Unggah ke Galeri</button>
                    <hr>
                    <div class="row g-2" id="adm-list-foto"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
            authDomain: "rt003-a6d85.firebaseapp.com",
            projectId: "rt003-a6d85",
            storageBucket: "rt003-a6d85.firebasestorage.app",
            messagingSenderId: "342671500828",
            appId: "1:342671500828:web:338c075feed136c803a1d9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. Auth Check
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-form').classList.add('d-none');
                document.getElementById('admin-panel').classList.remove('d-none');
                initData();
            } else {
                document.getElementById('login-form').classList.remove('d-none');
                document.getElementById('admin-panel').classList.add('d-none');
            }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch(err) { document.getElementById('login-error').innerText = "Email atau Password salah!"; }
        }

        function showSec(id, btn) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // 2. Database Functions
        function initData() {
            // Saldo
            db.collection("config").doc("kas").onSnapshot(doc => {
                if(doc.exists) document.getElementById('adm-total-saldo').innerText = `Rp ${Number(doc.data().total).toLocaleString('id-ID')}`;
            });
            // Warga
            db.collection("warga").orderBy("nama").onSnapshot(s => {
                let h = "";
                s.forEach(d => {
                    const w = d.data();
                    h += `<tr><td><b>${w.nama}</b></td><td>${w.hp}</td><td>${w.status}</td><td><button class="btn btn-danger btn-sm" onclick="delData('warga','${d.id}')">Hapus</button></td></tr>`;
                });
                document.getElementById('adm-list-warga').innerHTML = h;
            });
            // Foto
            db.collection("kegiatan").orderBy("tanggal","desc").onSnapshot(s => {
                let h = "";
                s.forEach(d => { h += `<div class="col-3 position-relative"><img src="${d.data().url}" class="img-fluid rounded border"><button class="btn btn-dark btn-sm position-absolute top-0 end-0" onclick="delData('kegiatan','${d.id}')">X</button></div>`; });
                document.getElementById('adm-list-foto').innerHTML = h;
            });
        }

        async function saveKas() {
            const amt = parseInt(document.getElementById('kas-amt').value);
            const type = document.getElementById('kas-type').value;
            const ref = db.collection("config").doc("kas");
            const snap = await ref.get();
            let total = snap.exists ? snap.data().total : 0;
            total = (type === 'in') ? total + amt : total - amt;
            await ref.set({ total });
            alert("Kas berhasil diupdate!");
            document.getElementById('kas-amt').value = "";
        }

        async function saveRonda() {
            const hari = document.getElementById('ron-hari').value;
            const nama = document.getElementById('ron-nama').value;
            await db.collection("ronda").doc(hari).set({ petugas: nama });
            alert(`Jadwal hari ${hari} berhasil diperbarui!`);
        }

        async function saveWarga() {
            const nama = document.getElementById('w-nama').value;
            const hp = document.getElementById('w-hp').value;
            const status = document.getElementById('w-status').value;
            await db.collection("warga").add({ nama, hp, status });
            alert("Warga ditambahkan!");
            document.getElementById('w-nama').value = ""; document.getElementById('w-hp').value = "";
        }

        async function uploadFoto() {
            const file = document.getElementById('f-file').files[0];
            if(!file) return alert("Pilih foto dulu!");
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=6bfd8efeb32a8bebf742a71cb0a8a04a", { method: "POST", body: fd });
            const result = await res.json();
            await db.collection("kegiatan").add({ url: result.data.url, tanggal: new Date() });
            alert("Foto terupload!");
        }

        function delData(col, id) {
            if(confirm("Yakin ingin menghapus data ini?")) db.collection(col).doc(id).delete();
        }
    </script>
</body>
</html>
