<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --navy: #1a3a5f; --gold: #f39c12; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--navy); color: white; padding: 20px; z-index: 1050; transition: 0.3s; }
        .main-content { margin-left: 260px; padding: 20px; transition: 0.3s; }
        .admin-section { display: none; }
        .active { display: block; }
        .toast-custom { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 25px; border-radius: 50px; color: white; display: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        @media (max-width: 991px) { .sidebar { transform: translateX(-100%); } .sidebar.show { transform: translateX(0); } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="notif-box" class="toast-custom shadow-lg"></div>

<div class="sidebar" id="sidebar">
    <h5 class="fw-bold mb-4">ADMIN RT 003</h5><hr>
    <nav class="nav flex-column gap-2">
        <a href="#" class="nav-link text-white" onclick="showSec('s-kas')"><i class="bi bi-cash"></i> Keuangan & Dansos</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-aduan')"><i class="bi bi-chat-left-dots"></i> Aduan Warga <span id="badge-aduan" class="badge bg-danger d-none">!</span></a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-ronda')"><i class="bi bi-shield"></i> Ronda</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-warga')"><i class="bi bi-people"></i> Data Warga</a>
        <a href="#" class="nav-link text-danger mt-5 fw-bold" onclick="logoutAdmin()">🚪 Logout</a>
    </nav>
</div>

<div class="main-content">
    <div id="s-kas" class="admin-section active">
        <h4 class="fw-bold mb-3">Input Kas & Dana Sosial</h4>
        <div class="card p-3 shadow-sm border-0 mb-3">
            <div class="row g-2">
                <div class="col-6"><label class="small fw-bold">Nominal</label><input type="number" id="k-amt" class="form-control"></div>
                <div class="col-6"><label class="small fw-bold">Kategori</label>
                    <select id="k-cat" class="form-select">
                        <option value="kas">Kas RT</option>
                        <option value="dansos">Dana Sosial (Dansos)</option>
                    </select>
                </div>
                <div class="col-6"><label class="small fw-bold">Tipe</label>
                    <select id="k-type" class="form-select"><option value="in">Masuk (+)</option><option value="out">Keluar (-)</option></select>
                </div>
                <div class="col-6"><label class="small fw-bold">Nama/Ket</label><input type="text" id="k-info" class="form-control" placeholder="Nama warga atau peruntukan"></div>
                <button class="btn btn-primary mt-3 fw-bold" onclick="saveTransaksi()">SIMPAN DATA</button>
            </div>
        </div>
        <div class="table-responsive bg-white p-2 rounded shadow-sm"><table class="table table-sm small"><tbody id="list-transaksi"></tbody></table></div>
    </div>

    <div id="s-aduan" class="admin-section">
        <h4 class="fw-bold mb-3">Laporan & Pengaduan Warga</h4>
        <div id="list-aduan" class="row g-3"></div>
    </div>

    <div id="s-warga" class="admin-section">
        <h4 class="fw-bold mb-3">Data Warga</h4>
        <div class="card p-3 shadow-sm border-0 mb-3">
            <input type="text" id="w-nama" class="form-control mb-2" placeholder="Nama Warga">
            <input type="number" id="w-telp" class="form-control mb-2" placeholder="No HP/WA">
            <button class="btn btn-success w-100" onclick="saveWarga()">Tambah Warga</button>
        </div>
        <table class="table bg-white small rounded shadow-sm"><tbody id="list-warga"></tbody></table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function n(msg, col="#2ecc71") {
        const b = document.getElementById('notif-box');
        b.innerText = msg; b.style.backgroundColor = col; b.style.display = 'block';
        setTimeout(() => b.style.display='none', 3000);
    }

    function showSec(id) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(window.innerWidth < 992) document.getElementById('sidebar').classList.remove('show');
    }

    // --- PERBAIKAN AKSES: Cek Login ---
    auth.onAuthStateChanged(u => { 
        if(!u) window.location.href="index.html";
        // Siapapun yang login (email admin manapun) bisa akses selama dia terdaftar di Firebase Auth Bapak
    });

    // --- TRANSAKSI KAS & DANSOS ---
    async function saveTransaksi() {
        const amt = parseInt(document.getElementById('k-amt').value) || 0;
        const cat = document.getElementById('k-cat').value;
        const type = document.getElementById('k-type').value;
        const info = document.getElementById('k-info').value;

        if(amt <= 0 || !info) return n("Data tidak lengkap!", "#e74c3c");

        try {
            await db.collection("transaksi").add({
                nominal: amt, kategori: cat, tipe: type, keterangan: info, tgl: firebase.firestore.Timestamp.now()
            });
            
            // Update Saldo Global (Anti-NaN)
            const refSaldo = db.collection("config").doc(cat); // kas atau dansos
            db.runTransaction(async (transaction) => {
                const snap = await transaction.get(refSaldo);
                let total = snap.exists ? Number(snap.data().total || 0) : 0;
                total = (type === 'in') ? total + amt : total - amt;
                transaction.set(refSaldo, { total: total }, { merge: true });
            });

            n("✅ Berhasil disimpan!");
            document.getElementById('k-amt').value = ""; document.getElementById('k-info').value = "";
        } catch(e) { n("❌ Gagal simpan", "#e74c3c"); }
    }

    // --- LIST TRANSAKSI ---
    db.collection("transaksi").orderBy("tgl", "desc").limit(20).onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const t = d.data();
            h += `<tr>
                <td>${t.kategori.toUpperCase()}</td>
                <td class="${t.tipe=='in'?'text-success':'text-danger'}">Rp ${t.nominal.toLocaleString()}</td>
                <td>${t.keterangan}</td>
                <td><button class="btn btn-sm text-danger" onclick="hapusTr('${d.id}', ${t.nominal}, '${t.tipe}', '${t.kategori}')">🗑️</button></td>
            </tr>`;
        });
        document.getElementById('list-transaksi').innerHTML = h;
    });

    async function hapusTr(id, amt, type, cat) {
        if(!confirm("Hapus data ini? Saldo akan dikoreksi.")) return;
        const refSaldo = db.collection("config").doc(cat);
        const snap = await refSaldo.get();
        let total = Number(snap.data().total || 0);
        total = (type === 'in') ? total - amt : total + amt;
        await refSaldo.update({ total });
        await db.collection("transaksi").doc(id).delete();
        n("🗑️ Data dihapus");
    }

    // --- PENGADUAN WARGA ---
    db.collection("pengaduan").orderBy("tgl", "desc").onSnapshot(s => {
        let h = "";
        if(s.empty) h = "<p class='text-muted'>Belum ada aduan.</p>";
        s.forEach(d => {
            const a = d.data();
            h += `<div class="col-md-6">
                <div class="card p-3 border-0 shadow-sm">
                    <div class="d-flex justify-content-between"><b>${a.nama}</b> <small class="text-muted">${a.tgl.toDate().toLocaleDateString()}</small></div>
                    <p class="my-2">${a.pesan}</p>
                    <button class="btn btn-sm btn-outline-danger w-25" onclick="db.collection('pengaduan').doc('${d.id}').delete()">Hapus</button>
                </div>
            </div>`;
        });
        document.getElementById('list-aduan').innerHTML = h;
    });

    function logoutAdmin() { auth.signOut().then(() => window.location.href="index.html"); }
</script>
</body>
</html>
