<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light">

    <div id="login-form" class="container mt-5" style="max-width: 400px;">
        <div class="card p-4 admin-card">
            <h4 class="text-center text-navy fw-bold mb-4">Login Pengurus</h4>
            <input type="email" id="email" class="form-control mb-2" placeholder="Email Admin">
            <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-primary w-100" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div id="admin-content" class="d-none">
        <nav class="navbar navbar-dark bg-navy px-4">
            <span class="navbar-brand">Admin RT 003</span>
            <button class="btn btn-outline-light btn-sm" onclick="firebase.auth().signOut()">Logout</button>
        </nav>

        <div class="container my-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card p-4 shadow-sm">
                        <h5 class="fw-bold text-navy mb-3">Input Data Warga</h5>
                        <input type="text" id="w-nama" class="form-control mb-2" placeholder="Nama Lengkap">
                        <input type="text" id="w-hp" class="form-control mb-2" placeholder="No HP (08xx)">
                        <select id="w-status" class="form-select mb-3">
                            <option value="Tetap">Tetap</option>
                            <option value="Kontrak">Kontrak</option>
                        </select>
                        <button class="btn btn-primary w-100" onclick="saveWarga()">Simpan Warga</button>
                        <hr>
                        <div id="admin-list-warga"></div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card p-4 shadow-sm">
                        <h5 class="fw-bold text-navy mb-3">Upload Foto Kegiatan</h5>
                        <input type="text" id="f-judul" class="form-control mb-2" placeholder="Judul Kegiatan">
                        <input type="file" id="f-file" class="form-control mb-3" accept="image/*">
                        <button class="btn btn-primary w-100" onclick="uploadFoto()">Unggah Foto</button>
                        <hr>
                        <div class="row g-2" id="admin-list-foto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
            authDomain: "rt003-a6d85.firebaseapp.com",
            projectId: "rt003-a6d85",
            storageBucket: "rt003-a6d85.firebasestorage.app",
            messagingSenderId: "342671500828",
            appId: "1:342671500828:web:338c075feed136c803a1d9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('login-form').classList.add('d-none');
                document.getElementById('admin-content').classList.remove('d-none');
                loadAdminData();
            } else {
                document.getElementById('login-form').classList.remove('d-none');
                document.getElementById('admin-content').classList.add('d-none');
            }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert("Login Gagal!"); }
        }

        async function saveWarga() {
            const nama = document.getElementById('w-nama').value;
            const hp = document.getElementById('w-hp').value;
            const status = document.getElementById('w-status').value;
            await db.collection("warga").add({ nama, hp, status });
            alert("Tersimpan!");
        }

        async function uploadFoto() {
            const file = document.getElementById('f-file').files[0];
            const judul = document.getElementById('f-judul').value;
            if(!file) return;
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=6bfd8efeb32a8bebf742a71cb0a8a04a", { method: "POST", body: fd });
            const data = await res.json();
            await db.collection("kegiatan").add({ judul, url: data.data.url, tanggal: new Date() });
            alert("Terupload!");
        }

        function loadAdminData() {
            db.collection("warga").onSnapshot(s => {
                let h = "";
                s.forEach(d => { h += `<div class="d-flex justify-content-between mb-2 small border-bottom pb-1">${d.data().nama} <button class="btn btn-danger btn-sm" style="font-size:10px" onclick="db.collection('warga').doc('${d.id}').delete()">Hapus</button></div>`; });
                document.getElementById('admin-list-warga').innerHTML = h;
            });
            db.collection("kegiatan").onSnapshot(s => {
                let h = "";
                s.forEach(d => { h += `<div class="col-4 position-relative"><img src="${d.data().url}" class="img-fluid rounded"><button class="btn btn-dark btn-sm position-absolute top-0 end-0" style="padding:0 5px" onclick="db.collection('kegiatan').doc('${d.id}').delete()">x</button></div>`; });
                document.getElementById('admin-list-foto').innerHTML = h;
            });
        }
    </script>
</body>
</html>
