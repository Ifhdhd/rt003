<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --green-main: #108a74; --navy: #1a2a3a; --bg-light: #f8faf9; }
        body { background: var(--bg-light); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .sidebar { background: var(--navy); min-height: 100vh; width: 250px; position: fixed; z-index: 1000; }
        .sidebar .nav-link { color: #ffffff99; padding: 15px 25px; display: flex; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #ffffff10; color: white; border-left: 4px solid var(--green-main); }
        .content { margin-left: 250px; padding: 30px; }
        .admin-section { display: none; }
        .active-section { display: block; animation: slideUp 0.3s; }
        .card-admin { border: none; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .form-control { border-radius: 10px; border: 1px solid #eee; background: #f8f9fa; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4 mb-3 border-bottom border-secondary text-center">
        <h5 class="fw-bold mb-0 text-white">PANEL KONTROL</h5>
        <small class="opacity-50 text-uppercase" style="font-size: 10px; color: white;">RT.003 RW.001</small>
    </div>
    <nav class="nav flex-column mt-2">
        <a class="nav-link active" onclick="showAdminSection('dash', this)"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-link" onclick="showAdminSection('warga', this)"><i class="bi bi-people"></i> Data Warga</a>
        <a class="nav-link" onclick="showAdminSection('keuangan', this)"><i class="bi bi-wallet2"></i> Kelola Kas</a>
        <a class="nav-link" onclick="showAdminSection('inventaris', this)"><i class="bi bi-box-seam"></i> Inventaris</a>
        <a class="nav-link" onclick="showAdminSection('aduan', this)"><i class="bi bi-chat-left-dots"></i> Aduan</a>
        <a class="nav-link text-danger mt-5" onclick="db.app.auth().signOut()"><i class="bi bi-door-open"></i> Logout</a>
    </nav>
</div>

<div class="content">
    <div class="card p-3 border-0 shadow-sm rounded-4 d-flex flex-row justify-content-between align-items-center mb-4 bg-white">
        <h5 class="fw-bold mb-0" id="section-title">Admin Dashboard</h5>
        <b class="text-navy small">RT 003 / RW 001 - Paninggilan</b>
    </div>

    <div id="dash-section" class="admin-section active-section">
        <div class="row g-4">
            <div class="col-md-4"><div class="card card-admin p-4 bg-success text-white text-center"><small>Saldo Kas RT</small><h2 class="fw-bold mt-2" id="v-kas">Rp 0</h2></div></div>
            <div class="col-md-4"><div class="card card-admin p-4 bg-white text-center"><small class="text-muted">Jumlah Warga Jiwa</small><h2 class="fw-bold mt-2 text-navy" id="v-jiwa">0</h2></div></div>
            <div class="col-md-4"><div class="card card-admin p-4 bg-white text-center"><small class="text-muted">Aduan Masuk</small><h2 class="fw-bold mt-2 text-danger">0</h2></div></div>
        </div>
    </div>

    <div id="keuangan-section" class="admin-section">
        <h5 class="fw-bold mb-4">Input Keuangan</h5>
        <div class="card card-admin p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-3"><label class="small fw-bold">Nominal</label><input type="number" id="k-amt" class="form-control"></div>
                <div class="col-md-3"><label class="small fw-bold">Kategori</label><select id="k-cat" class="form-select rounded-3"><option value="kas">Kas RT</option><option value="dansos">Dana Sosial</option></select></div>
                <div class="col-md-2"><label class="small fw-bold">Tipe</label><select id="k-type" class="form-select rounded-3"><option value="in">Masuk (+)</option><option value="out">Keluar (-)</option></select></div>
                <div class="col-md-4"><label class="small fw-bold">Keterangan</label><input type="text" id="k-info" class="form-control" placeholder="Nama warga / keperluan"></div>
                <button class="btn btn-green fw-bold py-2 mt-3" onclick="saveTransaksi()">SIMPAN</button>
            </div>
        </div>
        <div class="table-responsive bg-white p-2 rounded-4"><table class="table small align-middle"><tbody id="list-transaksi-admin"></tbody></table></div>
    </div>

    <div id="inventaris-section" class="admin-section">
        <h5 class="fw-bold mb-4">Input Inventaris Barang</h5>
        <div class="card card-admin p-4 mb-4">
            <div class="row g-2">
                <div class="col-md-6"><input type="text" id="i-nama" class="form-control" placeholder="Nama Barang (Misal: Tenda)"></div>
                <div class="col-md-4"><input type="text" id="i-lok" class="form-control" placeholder="Lokasi Simpan (Misal: Gudang/Pos)"></div>
                <div class="col-md-2"><input type="number" id="i-jml" class="form-control" placeholder="Jumlah (Unit)"></div>
                <button class="btn btn-green fw-bold py-2 mt-3" onclick="saveInventaris()">TAMBAH BARANG</button>
            </div>
        </div>
        <div id="list-inventaris-admin" class="row g-3"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(u => { if(!u) window.location.href="index.html"; });

    function showAdminSection(target, el) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(target + '-section').classList.add('active-section');
        document.getElementById('section-title').innerText = target.toUpperCase();
        el.classList.add('active');
    }

    // Monitor Data
    db.collection("config").doc("kas").onSnapshot(d => { document.getElementById('v-kas').innerText = "Rp " + (d.data().total || 0).toLocaleString(); });
    db.collection("warga").onSnapshot(s => { document.getElementById('v-jiwa').innerText = s.size; });

    // Simpan Transaksi & Update Saldo (Wajib Sinkron)
    async function saveTransaksi() {
        const amt = parseInt(document.getElementById('k-amt').value) || 0;
        const cat = document.getElementById('k-cat').value;
        const type = document.getElementById('k-type').value;
        const info = document.getElementById('k-info').value;

        if(amt <= 0 || !info) return alert("Isi lengkap!");

        // 1. Simpan Transaksi
        await db.collection("transaksi").add({ nominal: amt, kategori: cat, tipe: type, keterangan: info, tgl: firebase.firestore.Timestamp.now() });

        // 2. Update Saldo (Kalkulasi Otomatis)
        const refSaldo = db.collection("config").doc(cat);
        db.runTransaction(async (transaction) => {
            const snap = await transaction.get(refSaldo);
            let total = snap.exists ? Number(snap.data().total || 0) : 0;
            total = (type === 'in') ? total + amt : total - amt;
            transaction.set(refSaldo, { total: total }, { merge: true });
        });
        alert("Suksess!");
        document.getElementById('k-amt').value=""; document.getElementById('k-info').value="";
    }

    // LOGIKA INVENTARIS (INPUT BARU)
    async function saveInventaris() {
        const nama = document.getElementById('i-nama').value;
        const lok = document.getElementById('i-lok').value;
        const jml = document.getElementById('i-jml').value;
        if(!nama || !jml) return alert("Isi lengkap!");
        await db.collection("inventaris").add({ nama, lokasi: lok, jumlah: jml, tgl: firebase.firestore.Timestamp.now() });
        alert("Suksess!");
        document.getElementById('i-nama').value=""; document.getElementById('i-lok').value=""; document.getElementById('i-jml').value="";
    }
</script>
</body>
</html>
