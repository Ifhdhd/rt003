<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --main-teal: #108a74; --bg-admin: #f8f9fa; }
        body { background-color: var(--bg-admin); font-family: 'Plus Jakarta Sans', sans-serif; }
        .login-card { border: none; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 40px; background: white; max-width: 400px; width: 100%; }
        .btn-login { background: var(--main-teal); color: white; border-radius: 15px; padding: 12px; font-weight: 700; border: none; width: 100%; transition: 0.3s; }
        .btn-login:hover { background: #0b6b5a; transform: translateY(-3px); }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #eee; background: #fdfdfd; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="login-card text-center">
        <div class="mb-4">
            <i class="bi bi-shield-lock-fill text-success" style="font-size: 3rem;"></i>
            <h4 class="fw-800 mt-3">Login Pengurus</h4>
            <p class="text-muted small">Silakan masukkan PIN Keamanan</p>
        </div>

        <div id="loginForm">
            <input type="password" id="pinInput" class="form-control mb-3 text-center fs-4" placeholder="••••••" maxlength="6">
            <button class="btn-login shadow-sm" onclick="cekLogin()">MASUK PANEL</button>
            <a href="index.html" class="d-block mt-4 text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> Kembali ke Beranda
            </a>
        </div>
    </div>

    <script>
        // HAPUS SEMUA SCRIPT OTOMATIS REDIRECT LAMA BAPAK
        // Kode di bawah ini hanya akan jalan kalau tombol diklik
        
        function cekLogin() {
            const pin = document.getElementById('pinInput').value;
            
            // Contoh PIN sederhana: 123456 (Silakan ganti sesuai keinginan)
            if (pin === "123456") {
                alert("Login Berhasil! Selamat Datang Pak Mukhid.");
                // Di sini nanti arahkan ke halaman kelola data
                // window.location.href = "dashboard_admin.html"; 
            } else {
                alert("PIN Salah! Silakan coba lagi.");
            }
        }

        // CATATAN PENTING:
        // Jangan masukkan script window.location.href = "index.html" 
        // di luar fungsi manapun, karena itu yang bikin "Mental".
    </script>
</body>
</html>
