<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin RT 003 - No Alert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --navy: #1a3a5f; }
        body { background: #f4f7f6; font-family: sans-serif; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--navy); color: white; padding: 20px; transition: 0.3s; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 20px; }
        .admin-section { display: none; }
        .active { display: block; }

        /* NOTIFIKASI TOAST CUSTOM */
        .toast-custom {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; padding: 12px 25px; border-radius: 50px;
            color: white; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: none; animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }

        @media (max-width: 991px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

<div id="notif-box" class="toast-custom"></div>

<button class="btn btn-dark d-lg-none m-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>

<div class="sidebar shadow" id="sidebar">
    <h5 class="fw-bold text-center">ADMIN RT 003</h5><hr>
    <nav class="nav flex-column">
        <a href="#" class="nav-link text-white" onclick="showSec('s-kas')">💰 Kelola Kas</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-ronda')">👮 Kelola Ronda</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-warga')">👥 Kelola Warga</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-info')">📢 Pengumuman</a>
        <a href="index.html" class="nav-link text-warning mt-5"><i class="bi bi-arrow-left"></i> Kembali</a>
    </nav>
</div>

<div class="main-content">
    <div id="s-kas" class="admin-section active">
        <h4 class="fw-bold mb-3">Transaksi Kas</h4>
        <div class="card p-3 shadow-sm mb-3">
            <div class="row g-2">
                <div class="col-6"><input type="number" id="k-amt" class="form-control" placeholder="Nominal"></div>
                <div class="col-6">
                    <select id="k-type" class="form-select">
                        <option value="in">Masuk (+)</option>
                        <option value="out">Keluar (-)</option>
                    </select>
                </div>
                <div class="col-12"><input type="text" id="k-note" class="form-control" placeholder="Keterangan / Nama Warga"></div>
                <button class="btn btn-primary mt-2 fw-bold" onclick="saveKas()">SIMPAN TRANSAKSI</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-sm bg-white shadow-sm small">
                <thead class="table-dark"><tr><th>Tgl</th><th>Ket</th><th>Jml</th><th>Aksi</th></tr></thead>
                <tbody id="list-kas"></tbody>
            </table>
        </div>
    </div>

    <div id="s-ronda" class="admin-section">
        <h4 class="fw-bold mb-3">Jadwal Ronda</h4>
        <div class="card p-3 shadow-sm mb-3">
            <select id="r-hari" class="form-select mb-2">
                <option>Senin</option><option>Selasa</option><option>Rabu</option><option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option>
            </select>
            <input type="text" id="r-nama" class="form-control mb-2" placeholder="Nama Petugas">
            <button class="btn btn-warning fw-bold" onclick="saveRonda()">UPDATE JADWAL</button>
        </div>
        <div id="list-ronda"></div>
    </div>

    <div id="s-info" class="admin-section">
        <h4 class="fw-bold mb-3">Pengumuman Warga</h4>
        <div class="card p-3 shadow-sm">
            <textarea id="adm-pengumuman" class="form-control mb-2" rows="3" placeholder="Tulis pengumuman..."></textarea>
            <button class="btn btn-danger fw-bold" onclick="saveInfo()">KIRIM PENGUMUMAN</button>
        </div>
    </div>

    <div id="s-warga" class="admin-section">
        <h4 class="fw-bold mb-3">Data Warga</h4>
        <div class="card p-3 shadow-sm mb-3">
            <input type="text" id="w-nama" class="form-control mb-2" placeholder="Nama Lengkap">
            <select id="w-status" class="form-select mb-2"><option>Tetap</option><option>Kontrak</option></select>
            <button class="btn btn-success fw-bold" onclick="saveWarga()">TAMBAH WARGA</button>
        </div>
        <table class="table table-sm bg-white shadow-sm">
            <tbody id="list-warga"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // FUNGSI GANTI ALERT (NOTIFIKASI KEREN)
    function tampilNotif(pesan, warna = "#2ecc71") {
        const box = document.getElementById('notif-box');
        box.innerText = pesan;
        box.style.backgroundColor = warna;
        box.style.display = 'block';
        setTimeout(() => { box.style.display = 'none'; }, 3000);
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }

    function showSec(id) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(window.innerWidth < 992) toggleSidebar();
    }

    // SIMPAN PENGUMUMAN
    async function saveInfo() {
        const isi = document.getElementById('adm-pengumuman').value;
        await db.collection("config").doc("pengumuman").set({ isi: isi });
        tampilNotif("📢 Pengumuman diperbarui!");
    }

    // SIMPAN KAS
    async function saveKas() {
        const amt = parseInt(document.getElementById('k-amt').value);
        const note = document.getElementById('k-note').value;
        const type = document.getElementById('k-type').value;
        if(!amt || !note) return tampilNotif("Lengkapi data!", "#e74c3c");

        await db.collection("transaksi").add({ jumlah: amt, keterangan: note, tipe: type, tanggal: new Date() });
        const ref = db.collection("config").doc("kas");
        const snap = await ref.get();
        let total = snap.exists ? snap.data().total : 0;
        total = (type === 'in') ? total + amt : total - amt;
        await ref.set({ total });
        tampilNotif("💰 Transaksi berhasil!");
        document.getElementById('k-amt').value = ""; document.getElementById('k-note').value = "";
    }

    // SIMPAN RONDA & WARGA
    async function saveRonda() {
        await db.collection("ronda").doc(document.getElementById('r-hari').value).set({ petugas: document.getElementById('r-nama').value });
        tampilNotif("👮 Jadwal ronda disimpan!");
    }
    async function saveWarga() {
        await db.collection("warga").add({ nama: document.getElementById('w-nama').value, status: document.getElementById('w-status').value });
        tampilNotif("👥 Warga berhasil ditambah!");
        document.getElementById('w-nama').value = "";
    }

    // REALTIME LISTS
    db.collection("transaksi").orderBy("tanggal","desc").limit(10).onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const t = d.data();
            h += `<tr><td>${t.tanggal.toDate().toLocaleDateString()}</td><td>${t.keterangan}</td><td>${t.jumlah.toLocaleString()}</td><td><button class="btn btn-sm btn-light" onclick="delTrx('${d.id}',${t.jumlah},'${t.tipe}')">❌</button></td></tr>`;
        });
        document.getElementById('list-kas').innerHTML = h;
    });

    db.collection("warga").orderBy("nama").onSnapshot(s => {
        let h = ""; s.forEach(d => h += `<tr><td>${d.data().nama}</td><td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="db.collection('warga').doc('${d.id}').delete()">Hapus</button></td></tr>`);
        document.getElementById('list-warga').innerHTML = h;
    });

    db.collection("ronda").onSnapshot(s => {
        let h = ""; s.forEach(d => h += `<div class="p-2 mb-1 bg-white shadow-sm rounded d-flex justify-content-between"><span><b>${d.id}</b>: ${d.data().petugas}</span><button class="btn btn-sm text-danger" onclick="db.collection('ronda').doc('${d.id}').delete()">X</button></div>`);
        document.getElementById('list-ronda').innerHTML = h;
    });

    async function delTrx(id, jml, tipe) {
        if(!confirm("Hapus & kembalikan saldo?")) return;
        const ref = db.collection("config").doc("kas");
        const snap = await ref.get();
        let total = snap.data().total;
        total = (tipe === 'in') ? total - jml : total + jml;
        await ref.set({ total });
        await db.collection("transaksi").doc(id).delete();
        tampilNotif("🗑️ Transaksi dihapus!", "#3498db");
    }
</script>
</body>
</html>
