<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --navy: #1a3a5f; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--navy); color: white; padding: 20px; transition: 0.3s; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 20px; }
        .admin-section { display: none; }
        .active { display: block; }
        .toast-custom { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 25px; border-radius: 50px; color: white; display: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); min-width: 280px; text-align: center; }
        @media (max-width: 991px) { .sidebar { transform: translateX(-100%); } .sidebar.show { transform: translateX(0); } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="notif-box" class="toast-custom shadow-lg"></div>

<button class="btn btn-dark d-lg-none m-2" onclick="document.getElementById('sidebar').classList.toggle('show')"><i class="bi bi-list"></i></button>

<div class="sidebar" id="sidebar">
    <h5 class="fw-bold text-center">ADMIN RT 003</h5><hr>
    <nav class="nav flex-column gap-2 text-white">
        <a href="#" class="nav-link text-white" onclick="showSec('s-kas')">💰 Keuangan</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-ronda')">👮 Ronda</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-warga')">👥 Warga</a>
        <a href="#" class="nav-link text-white" onclick="showSec('s-info')">📢 Pengumuman</a>
        <a href="#" class="nav-link text-danger mt-4 fw-bold" onclick="logoutAdmin()">🚪 Logout</a>
    </nav>
</div>

<div class="main-content">
    <div id="s-kas" class="admin-section active">
        <h4 class="fw-bold mb-3" id="form-title">Input Transaksi Kas</h4>
        <div class="card p-3 shadow-sm mb-3 border-0">
            <div class="row g-2">
                <div class="col-6">
                    <label class="small fw-bold">Nominal (Rp)</label>
                    <input type="number" id="k-amt" class="form-control" placeholder="0">
                </div>
                <div class="col-6">
                    <label class="small fw-bold">Tipe</label>
                    <select id="k-type" class="form-select" onchange="toggleFormKas()">
                        <option value="in">Masuk (+)</option>
                        <option value="out">Keluar (-)</option>
                    </select>
                </div>
                <div class="col-12" id="input-nama">
                    <label class="small fw-bold">Nama Pembayar</label>
                    <input type="text" id="k-nama" class="form-control" placeholder="Nama Warga">
                </div>
                <div class="col-12 d-none" id="input-ket">
                    <label class="small fw-bold">Keterangan Pengeluaran</label>
                    <input type="text" id="k-note" class="form-control" placeholder="Contoh: Perbaikan Got">
                </div>
                <div class="col-12 mt-3 d-flex gap-2">
                    <button class="btn btn-primary fw-bold w-100 py-2" onclick="saveKas()">SIMPAN TRANSAKSI</button>
                    <button id="btn-cancel" class="btn btn-secondary d-none" onclick="resetForm()">Batal</button>
                </div>
            </div>
        </div>
        
        <div class="table-responsive bg-white rounded shadow-sm p-2">
            <table class="table table-sm small align-middle">
                <thead class="table-dark"><tr><th>Tgl</th><th>Info</th><th>Nominal</th><th>Aksi</th></tr></thead>
                <tbody id="list-kas"></tbody>
            </table>
        </div>
    </div>

    <div id="s-info" class="admin-section">
        <h4 class="fw-bold mb-3">Update Pengumuman</h4>
        <div class="card p-3 shadow-sm border-0">
            <textarea id="adm-p" class="form-control mb-2" rows="3"></textarea>
            <button class="btn btn-danger w-100 fw-bold" onclick="saveP()">UPDATE INFO</button>
        </div>
    </div>

    <div id="s-warga" class="admin-section">
        <h4 class="fw-bold mb-3">Data Warga</h4>
        <div class="card p-3 shadow-sm mb-3 border-0">
            <input type="text" id="w-nama" class="form-control mb-2" placeholder="Nama Lengkap">
            <select id="w-status" class="form-select mb-2"><option>Tetap</option><option>Kontrak</option></select>
            <button class="btn btn-success w-100 fw-bold" onclick="saveWarga()">TAMBAH</button>
        </div>
        <table class="table bg-white small shadow-sm"><tbody id="list-warga"></tbody></table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let editId = null;
    let oldAmt = 0;
    let oldType = "";

    auth.onAuthStateChanged(u => { if(!u) window.location.href="index.html"; });

    function n(msg, col="#2ecc71") {
        const b = document.getElementById('notif-box');
        b.innerText = msg; b.style.backgroundColor = col; b.style.display = 'block';
        setTimeout(() => b.style.display='none', 3000);
    }

    function showSec(id) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(window.innerWidth < 992) document.getElementById('sidebar').classList.remove('show');
    }

    function toggleFormKas() {
        const tp = document.getElementById('k-type').value;
        document.getElementById('input-nama').classList.toggle('d-none', tp === 'out');
        document.getElementById('input-ket').classList.toggle('d-none', tp === 'in');
    }

    async function saveKas() {
        const val = document.getElementById('k-amt').value;
        const amt = parseInt(val) || 0;
        const nm = document.getElementById('k-nama').value;
        const ket = document.getElementById('k-note').value;
        const tp = document.getElementById('k-type').value;

        if(amt <= 0 || (tp === 'in' && !nm) || (tp === 'out' && !ket)) return n("⚠️ Data tidak valid!", "#e74c3c");

        try {
            const refSaldo = db.collection("config").doc("kas");
            const snap = await refSaldo.get();
            let total = (snap.exists && !isNaN(snap.data().total)) ? Number(snap.data().total) : 0;

            if (editId) {
                // Hapus efek nominal lama dari total saldo
                total = (oldType === 'in') ? total - oldAmt : total + oldAmt;
                // Masukkan efek nominal baru
                total = (tp === 'in') ? total + amt : total - amt;

                await db.collection("transaksi").doc(editId).update({
                    jumlah: Number(amt), nama: tp==='in'?nm:'', keterangan: tp==='out'?ket:'', tipe: tp
                });
                n("✅ Transaksi Diperbarui!");
            } else {
                await db.collection("transaksi").add({
                    jumlah: Number(amt), nama: tp==='in'?nm:'', keterangan: tp==='out'?ket:'', tipe: tp, tanggal: firebase.firestore.Timestamp.now()
                });
                total = (tp === 'in') ? total + amt : total - amt;
                n("✅ Transaksi Tersimpan!");
            }

            await refSaldo.set({ total: Number(total) }, { merge: true });
            resetForm();
        } catch(e) { n("❌ Gagal: " + e.message, "#e74c3c"); }
    }

    function prepareEdit(id, amt, tp, nm, ket) {
        editId = id; 
        oldAmt = Number(amt) || 0; 
        oldType = tp;
        document.getElementById('form-title').innerText = "Edit Transaksi";
        document.getElementById('k-amt').value = amt;
        document.getElementById('k-type').value = tp;
        document.getElementById('k-nama').value = nm || "";
        document.getElementById('k-note').value = ket || "";
        document.getElementById('btn-cancel').classList.remove('d-none');
        toggleFormKas();
        window.scrollTo(0,0);
        n("✏️ Sedang mengedit...", "#3498db");
    }

    function resetForm() {
        editId = null;
        document.getElementById('form-title').innerText = "Input Transaksi Kas";
        document.getElementById('k-amt').value=""; document.getElementById('k-nama').value=""; document.getElementById('k-note').value="";
        document.getElementById('btn-cancel').classList.add('d-none');
    }

    db.collection("transaksi").orderBy("tanggal","desc").limit(15).onSnapshot(s => {
        let h = "";
        s.forEach(d => {
            const t = d.data();
            const jml = Number(t.jumlah) || 0;
            const info = (t.tipe === 'in') ? `<b>${t.nama}</b>` : `<span class="text-muted small">${t.keterangan}</span>`;
            h += `<tr>
                <td>${t.tanggal ? t.tanggal.toDate().toLocaleDateString('id-ID') : '-'}</td>
                <td>${info}</td>
                <td class="${t.tipe=='in'?'text-success':'text-danger'} fw-bold">${jml.toLocaleString()}</td>
                <td>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm btn-outline-info" onclick="prepareEdit('${d.id}', ${jml}, '${t.tipe}', '${t.nama || ""}', '${t.keterangan || ""}')"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="delT('${d.id}', ${jml}, '${t.tipe}')"><i class="bi bi-trash"></i></button>
                    </div>
                </td>
            </tr>`;
        });
        document.getElementById('list-kas').innerHTML = h;
    });

    async function delT(id, jml, tp) {
        if(!confirm("Yakin hapus data ini? Saldo otomatis menyesuaikan.")) return;
        try {
            const ref = db.collection("config").doc("kas");
            const snap = await ref.get();
            let total = (snap.exists && !isNaN(snap.data().total)) ? Number(snap.data().total) : 0;
            
            total = (tp === 'in') ? total - Number(jml) : total + Number(jml);
            
            await ref.set({ total: Number(total) }, { merge: true });
            await db.collection("transaksi").doc(id).delete();
            n("🗑️ Berhasil Dihapus!");
        } catch(e) { n("❌ Gagal!", "#e74c3c"); }
    }

    async function saveP() { 
        await db.collection("config").doc("pengumuman").set({ isi: document.getElementById('adm-p').value }); 
        n("✅ Pengumuman Terupdate!");
    }

    async function saveWarga() { 
        if(!document.getElementById('w-nama').value) return;
        await db.collection("warga").add({ nama: document.getElementById('w-nama').value, status: document.getElementById('w-status').value }); 
        n("✅ Warga Ditambah!");
        document.getElementById('w-nama').value="";
    }

    function logoutAdmin() {
        auth.signOut().then(() => { window.location.href="index.html"; });
    }

    db.collection("warga").orderBy("nama").onSnapshot(s => {
        let h = ""; s.forEach(d => h += `<tr><td>${d.data().nama}</td><td class="text-end small text-muted">${d.data().status}</td><td><button class="btn btn-sm text-danger" onclick="db.collection('warga').doc('${d.id}').delete()">X</button></td></tr>`);
        document.getElementById('list-warga').innerHTML = h;
    });
</script>
</body>
</html>
