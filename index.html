<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --navy: #1a3a5f; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .card-custom { border: none; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .card-custom:active { transform: scale(0.95); }
        .bg-navy { background: var(--navy); color: white; }
        #layer-container, #layer-login { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 9999; backdrop-filter: blur(5px); 
        }
    </style>
</head>
<body>

<div class="bg-navy p-4 text-center shadow-sm">
    <img src="logo.png" height="60" class="mb-2 rounded-circle border">
    <h5 class="fw-bold mb-0">PORTAL WARGA RT 003</h5>
    <small class="opacity-75">Satu Hati, Satu Lingkungan</small>
</div>

<div class="container mt-4">
    <div class="card card-custom shadow-sm p-3 mb-4" style="border-left: 5px solid #e74c3c; cursor: default;">
        <h6 class="fw-bold text-danger mb-1"><i class="bi bi-megaphone-fill me-2"></i>Pengumuman</h6>
        <p id="w-pengumuman" class="mb-0 small text-muted">Memuat...</p>
    </div>

    <div class="row g-3">
        <div class="col-6">
            <div class="card card-custom p-3 shadow-sm text-center bg-white" onclick="bukaLayer('kas')">
                <i class="bi bi-wallet2 fs-1 text-success mb-2"></i>
                <small class="text-muted d-block">Saldo Kas</small>
                <h5 class="fw-bold mb-0" id="w-saldo">Rp 0</h5>
            </div>
        </div>
        <div class="col-6">
            <div class="card card-custom p-3 shadow-sm text-center bg-white" onclick="bukaLayer('warga')">
                <i class="bi bi-people fs-1 text-primary mb-2"></i>
                <small class="text-muted d-block">Data Warga</small>
                <h5 class="fw-bold mb-0" id="w-total">0</h5>
            </div>
        </div>
        <div class="col-12">
            <div class="card card-custom p-3 shadow-sm bg-white" onclick="bukaLayer('ronda')">
                <div class="d-flex justify-content-between align-items-center">
                    <div><i class="bi bi-shield-check text-warning fs-4 me-2"></i> <span class="fw-bold">Jadwal Ronda</span></div>
                    <i class="bi bi-chevron-right text-muted"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="text-center my-5">
    <button class="btn btn-sm btn-light border opacity-50" onclick="document.getElementById('layer-login').style.display='block'">
        <i class="bi bi-lock-fill"></i> Panel Pengurus
    </button>
</div>

<div id="layer-container">
    <div class="container mt-5">
        <div class="card shadow-lg border-0 mx-auto" style="max-width: 450px; border-radius: 20px;">
            <div class="card-header bg-white border-0 d-flex justify-content-between p-3">
                <h5 class="fw-bold mb-0" id="l-title">Detail</h5>
                <button class="btn-close" onclick="tutupLayer()"></button>
            </div>
            <div class="card-body p-3" id="l-body" style="max-height: 70vh; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<div id="layer-login">
    <div class="container mt-5">
        <div class="card p-4 mx-auto shadow-lg" style="max-width:350px; border-radius:20px;">
            <div class="d-flex justify-content-between mb-3">
                <h5 class="fw-bold mb-0">Login Admin</h5>
                <button class="btn-close" onclick="document.getElementById('layer-login').style.display='none'"></button>
            </div>
            <input type="email" id="adm-email" class="form-control mb-2" placeholder="Email">
            <input type="password" id="adm-pass" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-primary w-100 fw-bold" onclick="prosesLogin()">MASUK</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    db.collection("config").doc("kas").onSnapshot(d => {
        let s = d.exists ? d.data().total : 0;
        document.getElementById('w-saldo').innerText = `Rp ${Number(s).toLocaleString('id-ID')}`;
    });
    db.collection("warga").onSnapshot(s => document.getElementById('w-total').innerText = s.size);
    db.collection("config").doc("pengumuman").onSnapshot(d => {
        document.getElementById('w-pengumuman').innerText = d.exists ? d.data().isi : "Tidak ada pengumuman.";
    });

    async function prosesLogin() {
        try {
            await auth.signInWithEmailAndPassword(document.getElementById('adm-email').value, document.getElementById('adm-pass').value);
            window.location.href = "admin.html";
        } catch(e) { alert("Login Gagal!"); }
    }

    async function bukaLayer(tipe) {
        const body = document.getElementById('l-body');
        document.getElementById('l-title').innerText = tipe === 'kas' ? 'Riwayat Kas' : (tipe === 'warga' ? 'Daftar Warga' : 'Jadwal Ronda');
        document.getElementById('layer-container').style.display = 'block';
        body.innerHTML = "Memuat...";

        if(tipe === 'kas') {
            const snap = await db.collection("transaksi").orderBy("tanggal","desc").limit(15).get();
            let h = '<ul class="list-group list-group-flush">';
            snap.forEach(d => {
                const t = d.data();
                h += `<li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <small class="text-muted d-block">${t.tanggal.toDate().toLocaleDateString('id-ID')}</small>
                        <b class="d-block">${t.nama}</b>
                        <span class="small text-muted">${t.keterangan}</span>
                    </div>
                    <b class="${t.tipe=='in'?'text-success':'text-danger'}">${t.tipe=='in'?'+':'-'} ${t.jumlah.toLocaleString()}</b>
                </li>`;
            });
            body.innerHTML = h + '</ul>';
        } else if(tipe === 'warga') {
            const snap = await db.collection("warga").orderBy("nama").get();
            let h = '<table class="table small"><thead><tr><th>Nama</th><th>Status</th></tr></thead><tbody>';
            snap.forEach(d => h += `<tr><td>${d.data().nama}</td><td>${d.data().status}</td></tr>`);
            body.innerHTML = h + '</tbody></table>';
        } else if(tipe === 'ronda') {
            const snap = await db.collection("ronda").get();
            let h = '';
            snap.forEach(d => h += `<div class="p-3 border-bottom"><b>${d.id}</b><br><span class="text-muted">${d.data().petugas}</span></div>`);
            body.innerHTML = h || "Belum ada jadwal.";
        }
    }
    function tutupLayer() { document.getElementById('layer-container').style.display = 'none'; }
</script>
</body>
</html>
