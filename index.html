<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT 003 RW 001</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a;}
.header{text-align:center;padding:20px;background:white;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.logo{width:70px;}
.menu{display:flex;gap:8px;overflow:auto;padding:10px;justify-content:center;background:white;}
.menu button{padding:10px;border-radius:20px;border:none;background:#e2e8f0;}
.menu button.active{background:#38bdf8;color:white;}
.card{background:white;margin:12px;padding:16px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
.hidden{display:none;}
.item{padding:10px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;}
.btn{margin-left:5px;cursor:pointer;}
.edit{color:#0ea5e9;}
.delete{color:#ef4444;}
input,select{padding:8px;margin:5px 0;width:100%;border-radius:8px;border:1px solid #cbd5f5;}
img{width:100%;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<h2>RT 003 RW 001</h2>
</div>

<div class="menu">
<button onclick="show('home',this)" class="active">Dashboard</button>
<button onclick="show('warga',this)">Warga</button>
<button onclick="show('kas',this)">Kas</button>
<button onclick="show('galeri',this)">Kegiatan</button>
<button onclick="show('ronda',this)">Ronda</button>
<button onclick="show('admin',this)">Admin</button>
</div>

<div id="home" class="card">
<canvas id="chartKas"></canvas>
</div>

<div id="warga" class="card hidden">
<h3>Warga</h3>
<div id="formWarga">
<input id="namaWarga" placeholder="nama">
<button onclick="tambahWarga()">Tambah</button>
</div>
<div id="listWarga"></div>
</div>

<div id="kas" class="card hidden">
<h3>Kas</h3>
<div id="formKas">
<input id="ketKas" placeholder="keterangan">
<input id="jumlahKas" placeholder="jumlah">
<select id="tipeKas">
<option value="masuk">Masuk</option>
<option value="keluar">Keluar</option>
</select>
<button onclick="tambahKas()">Tambah</button>
</div>
<div id="listKas"></div>
</div>

<div id="galeri" class="card hidden">
<h3>Kegiatan</h3>
<input type="file" id="fileFoto">
<input id="judulFoto" placeholder="judul">
<button onclick="uploadFoto()">Upload</button>
<div id="listGaleri"></div>
</div>

<div id="ronda" class="card hidden">
<h3>Ronda</h3>
<input id="namaRonda" placeholder="nama">
<input id="tanggalRonda" placeholder="tanggal">
<button onclick="tambahRonda()">Tambah</button>
<div id="listRonda"></div>
</div>

<div id="admin" class="card hidden">
<input id="email" placeholder="email">
<input id="password" type="password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="status"></p>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {getFirestore,collection,addDoc,deleteDoc,doc,updateDoc,onSnapshot} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
authDomain:"rt003-a6d85.firebaseapp.com",
projectId:"rt003-a6d85"
};

const API_KEY="6bfd8efeb32a8bebf742a71cb0a8a04a";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let isAdmin=false;
let chart;

const el=id=>document.getElementById(id);

window.show=(id,btn)=>{
document.querySelectorAll('.card').forEach(x=>x.classList.add('hidden'));
el(id).classList.remove('hidden');
document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

onAuthStateChanged(auth,(user)=>{
isAdmin=!!user;
el("status").innerText=isAdmin?"Admin":"User";
});

// LOGIN
window.login=()=>signInWithEmailAndPassword(auth,el("email").value,el("password").value);
window.logout=()=>signOut(auth);

// CRUD
window.tambahWarga=()=>addDoc(collection(db,"warga"),{nama:el("namaWarga").value});
window.tambahKas=()=>addDoc(collection(db,"kas"),{
ket:el("ketKas").value,
jumlah:+el("jumlahKas").value,
tipe:el("tipeKas").value
});
window.tambahRonda=()=>addDoc(collection(db,"ronda"),{
nama:el("namaRonda").value,
tanggal:el("tanggalRonda").value
});

// EDIT
window.editData=async(col,id,val)=>{
const baru=prompt("Edit:",val);
if(baru) await updateDoc(doc(db,col,id),{nama:baru,ket:baru});
};

// DELETE
window.hapus=(col,id)=>deleteDoc(doc(db,col,id));

// GALERI
window.uploadFoto=async()=>{
const file=el("fileFoto").files[0];
const fd=new FormData();
fd.append("image",file);
const res=await fetch("https://api.imgbb.com/1/upload?key="+API_KEY,{method:"POST",body:fd});
const data=await res.json();

addDoc(collection(db,"galeri"),{
judul:el("judulFoto").value,
url:data.data.url
});
};

// REALTIME
onSnapshot(collection(db,"warga"),snap=>{
el("listWarga").innerHTML="";
snap.forEach(d=>{
el("listWarga").innerHTML+=`
<div class="item">
${d.data().nama}
<div>
<span class="btn edit" onclick="editData('warga','${d.id}','${d.data().nama}')">✏️</span>
<span class="btn delete" onclick="hapus('warga','${d.id}')">❌</span>
</div>
</div>`;
});
});

onSnapshot(collection(db,"kas"),snap=>{
let masuk=0,keluar=0;
el("listKas").innerHTML="";
snap.forEach(d=>{
let x=d.data();
if(x.tipe=="masuk") masuk+=x.jumlah; else keluar+=x.jumlah;

el("listKas").innerHTML+=`
<div class="item">
${x.ket} - ${x.jumlah}
<div>
<span class="btn edit" onclick="editData('kas','${d.id}','${x.ket}')">✏️</span>
<span class="btn delete" onclick="hapus('kas','${d.id}')">❌</span>
</div>
</div>`;
});

if(chart) chart.destroy();
chart=new Chart(el("chartKas"),{
type:"pie",
data:{labels:["Masuk","Keluar"],datasets:[{data:[masuk,keluar]}]}
});
});

onSnapshot(collection(db,"galeri"),snap=>{
el("listGaleri").innerHTML="";
snap.forEach(d=>{
let x=d.data();
el("listGaleri").innerHTML+=`
<div class="item">
<img src="${x.url}">
<p>${x.judul}</p>
<span class="delete" onclick="hapus('galeri','${d.id}')">❌</span>
</div>`;
});
});

onSnapshot(collection(db,"ronda"),snap=>{
el("listRonda").innerHTML="";
snap.forEach(d=>{
let x=d.data();
el("listRonda").innerHTML+=`
<div class="item">
${x.nama} - ${x.tanggal}
<span class="delete" onclick="hapus('ronda','${d.id}')">❌</span>
</div>`;
});
});

</script>

</body>
</html>
