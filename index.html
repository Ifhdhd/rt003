<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Resmi RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-navy sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="logo.png" alt="Logo" height="40" class="me-2">
                <strong>RT 003 Online</strong>
            </a>
            <a href="admin.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="text-navy fw-bold">Selamat Datang Warga RT 003</h1>
            <p class="text-muted">Informasi Transparansi Lingkungan & Kegiatan Warga</p>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card p-4 shadow-sm mb-4">
                    <h4 class="text-navy border-bottom pb-2 mb-3">👥 Daftar Warga</h4>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead><tr><th>Nama</th><th>Blok</th><th>Status</th></tr></thead>
                            <tbody id="list-warga"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card p-4 shadow-sm">
                    <h4 class="text-navy border-bottom pb-2 mb-3">💰 Laporan Kas Terakhir</h4>
                    <div id="display-kas" class="fs-5 fw-bold text-success">Memuat saldo...</div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card p-4 shadow-sm">
                    <h4 class="text-navy border-bottom pb-2 mb-3">📸 Galeri Kegiatan</h4>
                    <div class="row g-2" id="galeri-warga"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
            authDomain: "rt003-a6d85.firebaseapp.com",
            projectId: "rt003-a6d85",
            storageBucket: "rt003-a6d85.firebasestorage.app",
            messagingSenderId: "342671500828",
            appId: "1:342671500828:web:338c075feed136c803a1d9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Ambil Data Warga
        db.collection("warga").orderBy("nama").onSnapshot(s => {
            let h = "";
            s.forEach(d => { h += `<tr><td>${d.data().nama}</td><td>${d.data().blok}</td><td><span class="badge bg-info">${d.data().status}</span></td></tr>`; });
            document.getElementById('list-warga').innerHTML = h || "<tr><td colspan='3'>Belum ada data</td></tr>";
        });

        // Ambil Galeri
        db.collection("kegiatan").orderBy("tanggal", "desc").onSnapshot(s => {
            let h = "";
            s.forEach(d => { h += `<div class="col-6"><img src="${d.data().url}" class="img-fluid rounded mb-1 shadow-sm"><p class="small text-center">${d.data().judul}</p></div>`; });
            document.getElementById('galeri-warga').innerHTML = h || "Belum ada foto";
        });
    </script>
</body>
</html>
