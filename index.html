<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RT 003 RW 001</title>

<style>
body{margin:0;font-family:system-ui;background:#020617;color:#e2e8f0;}
.menu{display:flex;gap:8px;overflow:auto;padding:10px;justify-content:center;}
.menu button{padding:10px;border-radius:20px;border:none;background:#0f172a;color:#94a3b8;}
.menu button.active{background:#38bdf8;color:black;}
.card{background:#0f172a;margin:12px;padding:16px;border-radius:12px;}
.hidden{display:none;}
img{width:100%;border-radius:10px;margin-top:10px;}
.item{padding:8px;border-bottom:1px solid #1e293b;}
</style>
</head>

<body>

<div class="menu">
<button onclick="show('home',this)" class="active">Dashboard</button>
<button onclick="show('warga',this)">Warga</button>
<button onclick="show('kas',this)">Kas</button>
<button onclick="show('laporan',this)">Laporan</button>
<button onclick="show('galeri',this)">Kegiatan</button>
<button onclick="show('ronda',this)">Ronda</button>
<button onclick="show('kontak',this)">Kontak</button>
<button onclick="show('admin',this)">Admin</button>
</div>

<div id="home" class="card">Selamat datang warga 👋</div>

<div id="warga" class="card hidden">
<h3>Data Warga</h3>
<div id="formWarga" class="hidden">
<input id="namaWarga" placeholder="nama">
<button onclick="tambahWarga()">Tambah</button>
</div>
<div id="listWarga"></div>
</div>

<div id="kas" class="card hidden">
<h3>Kas</h3>
<div id="formKas" class="hidden">
<input id="ketKas" placeholder="keterangan">
<input id="jumlahKas" placeholder="jumlah">
<select id="tipeKas">
<option value="masuk">Masuk</option>
<option value="keluar">Keluar</option>
</select>
<button onclick="tambahKas()">Tambah</button>
</div>
<div id="listKas"></div>
</div>

<div id="laporan" class="card hidden">
<h3>Laporan</h3>
<input id="namaLap" placeholder="nama">
<textarea id="isiLap" placeholder="isi"></textarea>
<button onclick="kirimLaporan()">Kirim</button>
</div>

<div id="galeri" class="card hidden">
<h3>Kegiatan</h3>
<div id="formGaleri" class="hidden">
<input type="file" id="fileFoto">
<input id="judulFoto" placeholder="judul">
<button onclick="uploadFoto()">Upload</button>
</div>
<div id="listGaleri"></div>
</div>

<div id="ronda" class="card hidden">
<h3>Ronda</h3>
<div id="formRonda" class="hidden">
<input id="namaRonda" placeholder="nama">
<input id="tanggalRonda" placeholder="tanggal">
<button onclick="tambahRonda()">Tambah</button>
</div>
<div id="listRonda"></div>
</div>

<div id="kontak" class="card hidden">
<h3>Kontak</h3>
<p>Ketua: Abdul Mukhid - 087774188870</p>
<p>Wakil: Lucky - 081298349222</p>
<p>Bendahara: Toto - 08568121707</p>
<p>Sekretaris: Bayu - 082298983714</p>
<p>Humas: Pursanto - 081371121986</p>
<p>Keamanan: Gunawan - 0895331784458</p>
</div>

<div id="admin" class="card hidden">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<p id="status"></p>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {getFirestore,collection,addDoc,getDocs} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"ISI_CONFIG",
authDomain:"ISI_CONFIG",
projectId:"ISI_CONFIG"
};

const API_KEY = "6bfd8efeb32a8bebf742a71cb0a8a04a";

const ADMINS = [
"admin_kt@rt003.com",
"admin_wkt@rt003.com",
"admin_hms@rt003.com",
"admin_bendahara@rt003.com",
"admin_sekertaris@rt003.com",
"admin_sekuriti@rt003.com"
];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let isAdmin=false;

window.show=(id,el)=>{
document.querySelectorAll('.card').forEach(x=>x.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
if(el) el.classList.add('active');
}

onAuthStateChanged(auth,(user)=>{
isAdmin = user && ADMINS.includes(user.email);
status.innerText = isAdmin ? "Admin" : "User";

formKas.classList.toggle("hidden",!isAdmin);
formWarga.classList.toggle("hidden",!isAdmin);
formGaleri.classList.toggle("hidden",!isAdmin);
formRonda.classList.toggle("hidden",!isAdmin);

loadAll();
});

window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);
window.logout=()=>signOut(auth);

window.uploadFoto = async ()=>{
if(!isAdmin) return alert("Hanya admin");

const file = fileFoto.files[0];
if(!file) return alert("Pilih foto");

const formData = new FormData();
formData.append("image", file);

const res = await fetch("https://api.imgbb.com/1/upload?key=" + API_KEY,{
method:"POST",
body:formData
});

const data = await res.json();
const url = data.data.url;

await addDoc(collection(db,"galeri"),{
judul:judulFoto.value,
url:url
});

loadAll();
};

window.tambahKas=()=>addDoc(collection(db,"kas"),{
ket:ketKas.value,
jumlah:jumlahKas.value,
tipe:tipeKas.value
}).then(loadAll);

window.tambahWarga=()=>addDoc(collection(db,"warga"),{
nama:namaWarga.value
}).then(loadAll);

window.tambahRonda=()=>addDoc(collection(db,"ronda"),{
nama:namaRonda.value,
tanggal:tanggalRonda.value
}).then(loadAll);

window.kirimLaporan=()=>addDoc(collection(db,"laporan"),{
nama:namaLap.value,
isi:isiLap.value
});

async function loadAll(){

// galeri
let g=await getDocs(collection(db,"galeri"));
listGaleri.innerHTML="";
g.forEach(d=>{
let x=d.data();
listGaleri.innerHTML+=`<img src="${x.url}"><p>${x.judul}</p>`;
});

// warga
let w=await getDocs(collection(db,"warga"));
listWarga.innerHTML="";
w.forEach(d=>{
listWarga.innerHTML+=`<div class="item">${d.data().nama}</div>`;
});

// kas
let k=await getDocs(collection(db,"kas"));
listKas.innerHTML="";
k.forEach(d=>{
let x=d.data();
listKas.innerHTML+=`<div class="item">${x.ket} - ${x.jumlah}</div>`;
});

// ronda
let r=await getDocs(collection(db,"ronda"));
listRonda.innerHTML="";
r.forEach(d=>{
let x=d.data();
listRonda.innerHTML+=`<div class="item">${x.nama} - ${x.tanggal}</div>`;
});

}

</script>

</body>
</html>
