<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga RT 003 RW 001</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --primary: #0d6efd; --navy: #1a3a5f; --bg-light: #f8f9fa; }
        body { background: var(--bg-light); font-family: 'Inter', sans-serif; color: #333; }
        
        /* Header & Banner */
        .header-top { background: var(--navy); color: white; padding: 40px 20px 80px; border-radius: 0 0 40px 40px; }
        .location-text { font-size: 0.85rem; opacity: 0.8; line-height: 1.4; }
        
        /* Saldo Area (Floating) */
        .saldo-container { margin-top: -60px; padding: 0 15px; }
        .card-saldo { border: none; border-radius: 20px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; }
        .val-money { font-weight: 800; font-size: 1.2rem; color: var(--navy); }
        
        /* Menu Grid (Mirip contoh base44) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .menu-item { background: white; padding: 15px 5px; border-radius: 20px; text-align: center; text-decoration: none; color: #444; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .menu-item i { font-size: 1.8rem; margin-bottom: 8px; display: block; }
        .menu-item span { font-size: 0.75rem; font-weight: 600; }
        
        /* Info Card */
        .info-card { background: linear-gradient(135deg, #ffffff, #f1f7ff); border-left: 5px solid var(--primary); border-radius: 15px; padding: 15px; margin-top: 25px; }
        
        /* Floating Button Login */
        .btn-admin-secret { position: fixed; bottom: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); opacity: 0.3; }

        .toast-custom { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 25px; border-radius: 50px; color: white; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="notif-box" class="toast-custom shadow-lg"></div>

<div class="header-top text-center">
    <h4 class="fw-bold mb-1">E-Warga RT 003</h4>
    <p class="location-text mb-0">
        Jl. Sadar RT.003 RW.001, Paninggilan<br>
        Ciledug, Tangerang, Banten
    </p>
</div>

<div class="container saldo-container">
    <div class="card-saldo">
        <div class="row text-center">
            <div class="col-6 border-end">
                <small class="text-muted d-block mb-1">Kas Utama</small>
                <span class="val-money" id="v-kas text-success">Rp 0</span>
            </div>
            <div class="col-6">
                <small class="text-muted d-block mb-1">Dana Sosial</small>
                <span class="val-money text-warning" id="v-dansos">Rp 0</span>
            </div>
        </div>
    </div>

    <div class="menu-grid">
        <a href="#" class="menu-item" onclick="alert('Menu Kas')">
            <i class="bi bi-wallet2 text-success"></i>
            <span>Kas RT</span>
        </a>
        <a href="#" class="menu-item" onclick="alert('Menu Ronda')">
            <i class="bi bi-shield-check text-primary"></i>
            <span>Jadwal Ronda</span>
        </a>
        <a href="#" class="menu-item" onclick="alert('Menu Warga')">
            <i class="bi bi-people text-info"></i>
            <span>Data Warga</span>
        </a>
        <a href="#" class="menu-item" onclick="scrollKe('aduan')">
            <i class="bi bi-chat-left-text text-warning"></i>
            <span>Aduan</span>
        </a>
        <a href="#" class="menu-item" onclick="alert('Menu Dansos')">
            <i class="bi bi-heart text-danger"></i>
            <span>Dana Sosial</span>
        </a>
        <a href="#" class="menu-item" onclick="alert('Menu Dokumen')">
            <i class="bi bi-file-earmark-text text-secondary"></i>
            <span>Surat</span>
        </a>
    </div>

    <div class="info-card shadow-sm">
        <div class="d-flex align-items-center gap-2 mb-2">
            <i class="bi bi-megaphone-fill text-danger"></i>
            <b class="small">PENGUMUMAN TERBARU</b>
        </div>
        <p id="v-info" class="mb-0 small text-muted">Belum ada pengumuman terbaru dari pengurus RT.</p>
    </div>

    <div id="aduan" class="mt-4 mb-5">
        <h6 class="fw-bold mb-3">Layanan Pengaduan</h6>
        <div class="card p-3 border-0 shadow-sm" style="border-radius: 20px;">
            <input type="text" id="a-nama" class="form-control mb-2 border-0 bg-light py-2" placeholder="Nama Lengkap" style="border-radius: 12px;">
            <textarea id="a-pesan" class="form-control mb-3 border-0 bg-light py-2" rows="3" placeholder="Tulis laporan atau saran..." style="border-radius: 12px;"></textarea>
            <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm" onclick="kirimAduan()" style="border-radius: 12px;">KIRIM LAPORAN</button>
        </div>
    </div>
</div>

<div class="btn-admin-secret" onclick="cekLoginClick()">
    <i class="bi bi-shield-lock"></i>
</div>

<div class="modal fade" id="modalLogin" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered px-4">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 25px;">
            <div class="modal-body p-4 text-center">
                <h5 class="fw-bold mb-3">Login Admin</h5>
                <input type="email" id="l-email" class="form-control mb-2" placeholder="Email">
                <input type="password" id="l-pass" class="form-control mb-3" placeholder="Password">
                <button class="btn btn-navy bg-primary text-white w-100 fw-bold" onclick="prosesLogin()">MASUK</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
        authDomain: "rt003-a6d85.firebaseapp.com",
        projectId: "rt003-a6d85",
        storageBucket: "rt003-a6d85.firebasestorage.app",
        messagingSenderId: "342671500828",
        appId: "1:342671500828:web:338c075feed136c803a1d9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function n(msg, col="#1a3a5f") {
        const b = document.getElementById('notif-box');
        b.innerText = msg; b.style.backgroundColor = col; b.style.display = 'block';
        setTimeout(() => b.style.display='none', 3000);
    }

    // Sync Data Realtime
    db.collection("config").doc("kas").onSnapshot(d => { if(d.exists) document.getElementById('v-kas').innerText = "Rp " + d.data().total.toLocaleString(); });
    db.collection("config").doc("dansos").onSnapshot(d => { if(d.exists) document.getElementById('v-dansos').innerText = "Rp " + d.data().total.toLocaleString(); });
    db.collection("config").doc("pengumuman").onSnapshot(d => { if(d.exists) document.getElementById('v-info').innerText = d.data().isi; });

    async function kirimAduan() {
        const nama = document.getElementById('a-nama').value;
        const pesan = document.getElementById('a-pesan').value;
        if(!nama || !pesan) return n("Mohon lengkapi form!", "#e74c3c");
        await db.collection("pengaduan").add({ nama, pesan, tgl: firebase.firestore.Timestamp.now() });
        n("✅ Laporan terkirim!");
        document.getElementById('a-nama').value=""; document.getElementById('a-pesan').value="";
    }

    let c = 0;
    function cekLoginClick() {
        c++; if (c >= 5) { c = 0; new bootstrap.Modal(document.getElementById('modalLogin')).show(); }
    }

    async function prosesLogin() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            window.location.href = "admin.html";
        } catch(e) { n("❌ Login Gagal!", "#e74c3c"); }
    }

    function scrollKe(id) { document.getElementById(id).scrollIntoView({behavior: 'smooth'}); }
</script>
</body>
</html>
