<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal RT 003</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-navy shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="logo.png" alt="Logo" height="35" class="me-2"> RT 003
            </a>
            <a href="admin.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-navy fw-bold mb-4 text-center">Daftar Warga RT 003</h2>

        <div class="display-desktop card p-4 shadow-sm">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>Nama Warga</th><th>Kontak WhatsApp</th><th>Status</th></tr>
                </thead>
                <tbody id="list-desktop"></tbody>
            </table>
        </div>

        <div class="display-mobile" id="list-mobile"></div>

        <hr class="my-5">
        <h2 class="text-navy fw-bold mb-4 text-center">Galeri Kegiatan</h2>
        <div class="row g-3" id="galeri-warga"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
            authDomain: "rt003-a6d85.firebaseapp.com",
            projectId: "rt003-a6d85",
            storageBucket: "rt003-a6d85.firebasestorage.app",
            messagingSenderId: "342671500828",
            appId: "1:342671500828:web:338c075feed136c803a1d9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Warga
        db.collection("warga").orderBy("nama").onSnapshot(s => {
            let dHTML = ""; let mHTML = "";
            s.forEach(doc => {
                const w = doc.data();
                const wa = `https://wa.me/${w.hp.replace(/[^0-9]/g, '')}`;
                dHTML += `<tr><td>${w.nama}</td><td><a href="${wa}" class="btn btn-sm btn-wa">Chat WA</a></td><td>${w.status}</td></tr>`;
                mHTML += `<div class="warga-card d-flex justify-content-between align-items-center">
                            <div><div class="fw-bold">${w.nama}</div><small class="text-muted">${w.status}</small></div>
                            <a href="${wa}" class="btn btn-wa btn-sm">WhatsApp</a>
                          </div>`;
            });
            document.getElementById('list-desktop').innerHTML = dHTML;
            document.getElementById('list-mobile').innerHTML = mHTML;
        });

        // Load Galeri
        db.collection("kegiatan").orderBy("tanggal", "desc").onSnapshot(s => {
            let gHTML = "";
            s.forEach(doc => {
                gHTML += `<div class="col-6 col-md-3"><img src="${doc.data().url}" class="gallery-img shadow-sm"><p class="small text-center mt-1">${doc.data().judul}</p></div>`;
            });
            document.getElementById('galeri-warga').innerHTML = gHTML;
        });
    </script>
</body>
</html>
