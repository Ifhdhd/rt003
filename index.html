<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Resmi RT 003 RW 001</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar navbar-dark bg-navy sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="logo.png" class="header-logo" alt="Logo">
                <span>RT 003 Online</span>
            </a>
            <a href="admin.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-lg-8">
                <div class="card card-custom p-4 text-center bg-white mb-4">
                    <h5 class="text-muted">Total Saldo Kas RT</h5>
                    <h1 class="text-navy fw-bold" id="total-saldo">Rp 0</h1>
                </div>

                <div class="card card-custom overflow-hidden">
                    <div class="card-header-custom">👥 Daftar Warga & Kontak</div>
                    <div class="p-3">
                        <div class="display-desktop">
                            <table class="table align-middle">
                                <thead><tr><th>Nama</th><th>WhatsApp</th><th>Status</th></tr></thead>
                                <tbody id="warga-list-destkop"></tbody>
                            </table>
                        </div>
                        <div class="display-mobile" id="warga-list-mobile"></div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card card-custom">
                    <div class="card-header-custom">👮 Jadwal Ronda Mingguan</div>
                    <div class="p-3" id="ronda-display"></div>
                </div>
            </div>
        </div>

        <h4 class="mt-5 text-navy fw-bold">📸 Galeri Kegiatan</h4>
        <div class="row g-3 mt-2" id="galeri-display"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBtMhGOhQSGrrQp1Hah0paYgsMG3r2QVeM",
            authDomain: "rt003-a6d85.firebaseapp.com",
            projectId: "rt003-a6d85",
            storageBucket: "rt003-a6d85.firebasestorage.app",
            messagingSenderId: "342671500828",
            appId: "1:342671500828:web:338c075feed136c803a1d9"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Data Real-time
        db.collection("warga").orderBy("nama").onSnapshot(s => {
            let d = ""; let m = "";
            s.forEach(doc => {
                const w = doc.data();
                const wa = `https://wa.me/${w.hp.replace(/[^0-9]/g, '')}`;
                d += `<tr><td>${w.nama}</td><td><a href="${wa}" class="btn btn-sm btn-success rounded-pill">Chat WA</a></td><td>${w.status}</td></tr>`;
                m += `<div class="border-bottom py-2 d-flex justify-content-between"><div><b>${w.nama}</b><br><small>${w.hp}</small></div><a href="${wa}" class="btn btn-sm btn-success align-self-center">WA</a></div>`;
            });
            document.getElementById('warga-list-destkop').innerHTML = d;
            document.getElementById('warga-list-mobile').innerHTML = m;
        });

        db.collection("config").doc("kas").onSnapshot(doc => {
            if(doc.exists) document.getElementById('total-saldo').innerText = `Rp ${Number(doc.data().total).toLocaleString('id-ID')}`;
        });

        db.collection("ronda").orderBy("order").onSnapshot(s => {
            let h = "";
            s.forEach(d => { h += `<div class="mb-2 p-2 border-start border-4 border-warning bg-light"><strong>${d.id}:</strong><br><small>${d.data().petugas || 'Belum ada'}</small></div>`; });
            document.getElementById('ronda-display').innerHTML = h;
        });

        db.collection("kegiatan").orderBy("tanggal","desc").limit(4).onSnapshot(s => {
            let h = "";
            s.forEach(d => { h += `<div class="col-6 col-md-3"><img src="${d.data().url}" class="img-fluid rounded shadow-sm"></div>`; });
            document.getElementById('galeri-display').innerHTML = h;
        });
    </script>
</body>
</html>
